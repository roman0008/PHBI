<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kas PHBI - MABDA'IL FALAH</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
body { font-family: sans-serif; }
</style>
</head>

<body class="bg-slate-50">
<div id="root"></div>

<script type="text/babel">

const { useState, useEffect } = React;

const GSHEET_URL = "https://script.google.com/macros/s/AKfycbw488C_jSYN96tRoU9nM-tBbCiqOV1xBAd68uaxa2fn4dQ52_ylzWos1-7YvmtFAQEt/exec";

const Icon = ({ name }) => <i data-lucide={name}></i>;

function App(){

const [view,setView]=useState("dashboard");
const [sidebar,setSidebar]=useState(false);
const [data,setData]=useState([]);
const [loading,setLoading]=useState(false);
const [search,setSearch]=useState("");

useEffect(()=>{
 fetchData();
 setTimeout(()=>lucide.createIcons(),300);
},[]);

useEffect(()=>{lucide.createIcons()},[view,data,sidebar]);

const fetchData=async()=>{
 setLoading(true);
 try{
  const res=await fetch(GSHEET_URL);
  const json=await res.json();
  setData(json.sort((a,b)=>b.id-a.id));
 }catch(e){console.log(e)}
 setLoading(false);
};

const totalIn = data.filter(d=>d.type==="in").reduce((a,b)=>a+Number(b.amount),0);
const totalOut = data.filter(d=>d.type==="out").reduce((a,b)=>a+Number(b.amount),0);
const saldo = totalIn-totalOut;

const rupiah = (n)=> new Intl.NumberFormat("id-ID",{style:"currency",currency:"IDR",minimumFractionDigits:0}).format(n||0);

const filtered = data.filter(d=>d.description?.toLowerCase().includes(search.toLowerCase()));

return(
<div className="flex min-h-screen">

{/* SIDEBAR */}
<div className={`fixed z-50 inset-y-0 left-0 w-64 bg-white shadow-lg transform transition ${sidebar?'translate-x-0':'-translate-x-full'} lg:translate-x-0`}>

<div className="p-5 border-b text-center">
<h1 className="font-black text-green-700">MABDA'IL FALAH</h1>
</div>

<div className="p-4 space-y-2">
<button onClick={()=>{setView("dashboard");setSidebar(false)}} className="w-full text-left p-3 rounded hover:bg-green-100">Dashboard</button>
<button onClick={()=>{setView("history");setSidebar(false)}} className="w-full text-left p-3 rounded hover:bg-green-100">Riwayat</button>
<button onClick={()=>{setView("struktur");setSidebar(false)}} className="w-full text-left p-3 rounded hover:bg-green-100">Struktur</button>
</div>

</div>

{/* MAIN */}
<div className="flex-1 lg:ml-64 flex flex-col">

{/* TOP */}
<div className="flex justify-between items-center p-4 bg-white shadow">
<button className="lg:hidden" onClick={()=>setSidebar(true)}>
☰
</button>
<h1 className="font-bold uppercase">{view}</h1>
</div>

<div className="p-4 flex-1">

{/* DASHBOARD */}
{view==="dashboard" &&(
<div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">

<div className="bg-green-600 text-white p-5 rounded">
<p>Saldo</p>
<h2 className="text-xl font-bold">{rupiah(saldo)}</h2>
</div>

<div className="bg-blue-600 text-white p-5 rounded">
<p>Pemasukan</p>
<h2 className="text-xl font-bold">{rupiah(totalIn)}</h2>
</div>

<div className="bg-red-600 text-white p-5 rounded">
<p>Pengeluaran</p>
<h2 className="text-xl font-bold">{rupiah(totalOut)}</h2>
</div>

</div>
)}

{/* HISTORY */}
{view==="history" &&(
<div className="bg-white rounded shadow">

<div className="p-3">
<input placeholder="Cari..." className="border p-2 w-full rounded" onChange={e=>setSearch(e.target.value)}/>
</div>

<div className="overflow-x-auto">
<table className="w-full text-sm">
<thead className="bg-gray-100">
<tr>
<th className="p-2">Tanggal</th>
<th className="p-2">Keterangan</th>
<th className="p-2">Kategori</th>
<th className="p-2 text-right">Nominal</th>
</tr>
</thead>

<tbody>
{filtered.map((d,i)=>(
<tr key={i} className="border-t">
<td className="p-2">{d.date}</td>
<td className="p-2">{d.description}</td>
<td className="p-2">{d.category}</td>
<td className={`p-2 text-right ${d.type==='in'?'text-green-600':'text-red-600'}`}>
{rupiah(d.amount)}
</td>
</tr>
))}
</tbody>
</table>
</div>

</div>
)}

{/* STRUKTUR */}
{view==="struktur" &&(
<div className="bg-white p-5 rounded shadow max-w-md mx-auto">

<h2 className="font-bold mb-4 text-center">Struktur PHBI</h2>

<div className="space-y-2 text-sm">
<p>Ketua : -</p>
<p>Sekretaris : -</p>
<p>Bendahara : -</p>
</div>

</div>
)}

</div>

{/* FOOTER */}
<footer className="bg-white text-center text-xs p-4 border-t">
Pondok Pesantren MABDA'IL FALAH - Kp. Tanjakan
</footer>

</div>

</div>
);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
