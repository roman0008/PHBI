<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kas PHBI MABDA'IL FALAH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .marquee-container {
            width: 100%;
            overflow: hidden;
            background: #15803d;
            color: white;
            padding: 12px 0;
            display: flex;
        }

        .marquee-content {
            display: inline-block;
            white-space: nowrap;
            animation: marquee 30s linear infinite;
            font-weight: 800;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        @keyframes marquee {
            0 { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .glass-header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        [data-lucide] {
            stroke-width: 2.5px;
            display: inline-block;
            vertical-align: middle;
        }

        @media print {
            .no-print { display: none !important; }
            main { margin: 0 !important; padding: 0 !important; }
        }
    </style>
</head>
<body class="bg-[#FBFCFE] text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;
        
        const GSHEET_URL = "https://script.google.com/macros/s/AKfycbw488C_jSYN96tRoU9nM-tBbCiqOV1xBAd68uaxa2fn4dQ52_ylzWos1-7YvmtFAQEt/exec"; 
        const ADMIN_USER = "mabdail_admin";
        const ADMIN_PASS = "Mabda2026!PHBI";

        const App = () => {
            const [isAdmin, setIsAdmin] = useState(false);
            const [showLoginModal, setShowLoginModal] = useState(false);
            const [loginData, setLoginData] = useState({ username: '', password: '' });
            const [loginError, setLoginError] = useState('');
            const [view, setView] = useState('dashboard');
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [editingId, setEditingId] = useState(null);
            const [loading, setLoading] = useState(false);
            const [transactions, setTransactions] = useState([]);
            const [currentTime, setCurrentTime] = useState(new Date());

            const [formData, setFormData] = useState({
                description: '',
                amount: '',
                type: 'in',
                category: 'Donasi',
                date: new Date().toISOString().split('T')[0]
            });

            const refreshIcons = useCallback(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, []);

            useEffect(() => {
                refreshIcons();
            }, [view, isAdmin, showLoginModal, transactions, sidebarOpen, refreshIcons]);

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                fetchData();
                return () => clearInterval(timer);
            }, []);

            const fetchData = async () => {
                setLoading(true);
                try {
                    const response = await fetch(GSHEET_URL);
                    const data = await response.json();
                    setTransactions(data.sort((a, b) => b.id - a.id));
                } catch (error) {
                    console.error("Gagal ambil data:", error);
                } finally {
                    setLoading(false);
                }
            };

            const handleLogin = (e) => {
                e.preventDefault();
                if (loginData.username === ADMIN_USER && loginData.password === ADMIN_PASS) {
                    setIsAdmin(true);
                    setShowLoginModal(false);
                    setLoginError('');
                    setLoginData({ username: '', password: '' });
                } else {
                    setLoginError('Kredensial salah atau tidak aman!');
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (loading) return;
                setLoading(true);
                const payload = { ...formData, amount: parseFloat(formData.amount), id: editingId || Date.now(), action: editingId ? 'edit' : 'add' };
                try {
                    await fetch(GSHEET_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
                    setTimeout(() => {
                        fetchData();
                        setEditingId(null);
                        setFormData({ description: '', amount: '', type: 'in', category: 'Donasi', date: new Date().toISOString().split('T')[0] });
                        setView('history');
                        setLoading(false);
                    }, 1500);
                } catch (err) {
                    console.error("Submit error:", err);
                    setLoading(false);
                }
            };

            const totals = useMemo(() => {
                const tin = transactions.filter(t => t.type === 'in').reduce((acc, curr) => acc + Number(curr.amount), 0);
                const tout = transactions.filter(t => t.type === 'out').reduce((acc, curr) => acc + Number(curr.amount), 0);
                return { in: tin, out: tout, balance: tin - tout };
            }, [transactions]);

            const formatCurrency = (amount) => {
                return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(amount || 0);
            };

            const filteredTransactions = transactions.filter(t => t.description?.toString().toLowerCase().includes(searchTerm.toLowerCase()));

            return (
                <div className="flex flex-col min-h-screen">
                    {/* Header */}
                    <header className="no-print sticky top-0 z-50 glass-header border-b border-slate-200 px-4 md:px-8 py-3 flex items-center justify-between">
                        <div className="flex items-center gap-3">
                            <button onClick={() => setSidebarOpen(true)} className="lg:hidden p-2 text-green-700 bg-green-50 rounded-xl">
                                <i data-lucide="menu"></i>
                            </button>
                            <div>
                                <h1 className="text-base md:text-lg font-extrabold text-green-800 leading-none">MABDA'IL FALAH</h1>
                                <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-1">Digital Kas PHBI</p>
                            </div>
                        </div>
                        <div className="text-right">
                            <div className="text-lg md:text-xl font-mono font-black text-slate-800 tabular-nums leading-none">{currentTime.toLocaleTimeString('id-ID')}</div>
                            <div className="text-[9px] font-bold text-slate-400 uppercase mt-1">{currentTime.toLocaleDateString('id-ID', { weekday: 'short', day: 'numeric', month: 'short' })}</div>
                        </div>
                    </header>

                    {/* Banner Berjalan */}
                    <div className="no-print marquee-container">
                        <div className="marquee-content">
                            <span className="mx-8">Selamat Datang di Portal Keuangan PHBI Mabda'il Falah Tangerang</span>
                            <span className="mx-8">•</span>
                            <span className="mx-8">Saldo Saat Ini: {formatCurrency(totals.balance)}</span>
                            <span className="mx-8">•</span>
                            <span className="mx-8">Lokasi: Kp. Tanjakan, Rajeg, Tangerang</span>
                        </div>
                    </div>

                    <div className="flex flex-1 overflow-hidden">
                        {/* Sidebar */}
                        <aside className={`fixed inset-y-0 left-0 z-[60] w-64 bg-white border-r transition-transform duration-300 lg:translate-x-0 lg:static ${sidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                            <div className="p-6 border-b flex justify-between items-center lg:hidden">
                                <span className="font-black text-xs text-green-700 uppercase tracking-widest">Menu Utama</span>
                                <button onClick={() => setSidebarOpen(false)}><i data-lucide="x" className="w-5 h-5"></i></button>
                            </div>
                            <div className="p-4 space-y-2">
                                <button onClick={() => {setView('dashboard'); setSidebarOpen(false)}} className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl font-bold text-sm ${view === 'dashboard' ? 'bg-green-700 text-white shadow-lg' : 'text-slate-500 hover:bg-slate-50'}`}>
                                    <i data-lucide="layout-grid" className="w-5 h-5"></i> Dashboard
                                </button>
                                <button onClick={() => {setView('history'); setSidebarOpen(false)}} className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl font-bold text-sm ${view === 'history' ? 'bg-green-700 text-white shadow-lg' : 'text-slate-500 hover:bg-slate-50'}`}>
                                    <i data-lucide="list" className="w-5 h-5"></i> Riwayat Transaksi
                                </button>
                                <button onClick={() => {setView('struktur'); setSidebarOpen(false)}} className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl font-bold text-sm ${view === 'struktur' ? 'bg-green-700 text-white shadow-lg' : 'text-slate-500 hover:bg-slate-50'}`}>
                                    <i data-lucide="users" className="w-5 h-5"></i> Kepengurusan
                                </button>
                                {isAdmin && (
                                    <div className="pt-4 mt-4 border-t border-slate-100">
                                        <button onClick={() => {setView('add'); setSidebarOpen(false)}} className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl font-bold text-sm ${view === 'add' ? 'bg-blue-600 text-white' : 'text-blue-600 bg-blue-50'}`}>
                                            <i data-lucide="plus-circle" className="w-5 h-5"></i> {editingId ? 'Edit Data' : 'Input Baru'}
                                        </button>
                                    </div>
                                )}
                            </div>
                            <div className="absolute bottom-6 left-4 right-4">
                                {!isAdmin ? (
                                    <button onClick={() => setShowLoginModal(true)} className="w-full py-4 bg-slate-900 text-white rounded-2xl font-black text-xs tracking-widest flex items-center justify-center gap-2"><i data-lucide="lock" className="w-4 h-4"></i> LOGIN ADMIN</button>
                                ) : (
                                    <button onClick={() => setIsAdmin(false)} className="w-full py-4 bg-red-50 text-red-600 rounded-2xl font-black text-xs flex items-center justify-center gap-2"><i data-lucide="log-out" className="w-4 h-4"></i> KELUAR</button>
                                )}
                            </div>
                        </aside>

                        {/* Main Content */}
                        <div className="flex-1 flex flex-col overflow-y-auto bg-[#F8FAFC]">
                            <main className="flex-1 p-4 md:p-8">
                                {view === 'dashboard' && (
                                    <div className="max-w-5xl mx-auto space-y-6">
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                            <div className="bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm">
                                                <div className="w-12 h-12 bg-green-100 text-green-700 rounded-2xl flex items-center justify-center mb-4"><i data-lucide="wallet"></i></div>
                                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Saldo Saat Ini</p>
                                                <h3 className="text-2xl font-black text-slate-800 tabular-nums mt-1">{formatCurrency(totals.balance)}</h3>
                                            </div>
                                            <div className="bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm">
                                                <div className="w-12 h-12 bg-blue-100 text-blue-700 rounded-2xl flex items-center justify-center mb-4"><i data-lucide="arrow-down-to-dot"></i></div>
                                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Total Pemasukan</p>
                                                <h3 className="text-2xl font-black text-blue-600 tabular-nums mt-1">{formatCurrency(totals.in)}</h3>
                                            </div>
                                            <div className="bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm">
                                                <div className="w-12 h-12 bg-red-100 text-red-700 rounded-2xl flex items-center justify-center mb-4"><i data-lucide="arrow-up-from-dot"></i></div>
                                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Total Pengeluaran</p>
                                                <h3 className="text-2xl font-black text-red-600 tabular-nums mt-1">{formatCurrency(totals.out)}</h3>
                                            </div>
                                        </div>

                                        <div className="bg-white rounded-[32px] border border-slate-100 shadow-sm overflow-hidden p-6">
                                            <div className="flex items-center justify-between mb-6">
                                                <h3 className="font-black text-slate-800">Aktivitas Terakhir</h3>
                                                <button onClick={() => setView('history')} className="text-[10px] font-black text-green-700 bg-green-50 px-3 py-1.5 rounded-lg uppercase">Semua</button>
                                            </div>
                                            <div className="space-y-4">
                                                {transactions.slice(0, 5).map((t, i) => (
                                                    <div key={i} className="flex items-center justify-between p-4 bg-slate-50 rounded-2xl">
                                                        <div className="flex items-center gap-4">
                                                            <div className={`p-3 rounded-xl ${t.type === 'in' ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}`}><i data-lucide={t.type === 'in' ? 'arrow-down-left' : 'arrow-up-right'}></i></div>
                                                            <div>
                                                                <p className="font-bold text-sm text-slate-800 leading-tight">{t.description}</p>
                                                                <p className="text-[10px] font-bold text-slate-400 mt-1">{t.category} • {new Date(t.date).toLocaleDateString('id-ID')}</p>
                                                            </div>
                                                        </div>
                                                        <p className={`font-black text-sm ${t.type === 'in' ? 'text-green-600' : 'text-red-600'}`}>{t.type === 'in' ? '+' : '-'} {formatCurrency(t.amount).replace('Rp', '')}</p>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {view === 'history' && (
                                    <div className="bg-white rounded-[32px] border border-slate-100 shadow-sm overflow-hidden">
                                        <div className="p-6 border-b flex flex-col md:flex-row gap-4 items-center justify-between">
                                            <div className="relative w-full max-w-sm">
                                                <i data-lucide="search" className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4"></i>
                                                <input type="text" placeholder="Cari data..." className="w-full pl-11 pr-4 py-3 bg-slate-50 rounded-2xl text-sm font-bold outline-none" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                                            </div>
                                            <button onClick={() => window.print()} className="px-6 py-3 bg-slate-900 text-white rounded-2xl font-black text-xs flex items-center gap-2"><i data-lucide="printer" className="w-4 h-4"></i> CETAK</button>
                                        </div>
                                        <div className="overflow-x-auto">
                                            <table className="w-full">
                                                <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase text-left">
                                                    <tr><th className="p-6">Tanggal</th><th className="p-6">Keterangan</th><th className="p-6 text-right">Nominal</th></tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-50">
                                                    {filteredTransactions.map((t, i) => (
                                                        <tr key={i} className="hover:bg-slate-50">
                                                            <td className="p-6 text-xs font-bold text-slate-500">{new Date(t.date).toLocaleDateString('id-ID')}</td>
                                                            <td className="p-6 text-sm font-bold text-slate-800">{t.description}</td>
                                                            <td className={`p-6 text-right font-black text-sm ${t.type === 'in' ? 'text-green-600' : 'text-red-600'}`}>{formatCurrency(t.amount)}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                )}

                                {view === 'struktur' && (
                                    <div className="max-w-2xl mx-auto py-10 bg-white rounded-[40px] border border-slate-100 p-10 text-center">
                                        <h2 className="text-2xl font-black text-slate-800 mb-8">Struktur Pengelola PHBI</h2>
                                        <div className="space-y-6 text-left">
                                            {[{role: 'Ketua Pelaksana', name: 'Ust. Fulanuddin'}, {role: 'Bendahara', name: 'Kang Fulan Arifin'}, {role: 'Sekretaris', name: 'Ustz. Fulanah'}].map((p, i) => (
                                                <div key={i} className="flex justify-between items-center border-b border-slate-50 pb-4">
                                                    <span className="text-[10px] font-black text-slate-300 uppercase tracking-widest">{p.role}</span>
                                                    <span className="font-extrabold text-slate-700">{p.name}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {view === 'add' && isAdmin && (
                                    <div className="max-w-xl mx-auto bg-white p-8 rounded-[40px] border border-slate-100 shadow-xl">
                                        <h2 className="text-2xl font-black text-slate-800 mb-8">Input Transaksi</h2>
                                        <form onSubmit={handleSubmit} className="space-y-6">
                                            <div className="grid grid-cols-2 gap-4">
                                                <select className="w-full p-4 bg-slate-50 rounded-2xl font-bold border-none outline-none" value={formData.type} onChange={(e) => setFormData({...formData, type: e.target.value})}>
                                                    <option value="in">PEMASUKAN</option><option value="out">PENGELUARAN</option>
                                                </select>
                                                <select className="w-full p-4 bg-slate-50 rounded-2xl font-bold border-none outline-none" value={formData.category} onChange={(e) => setFormData({...formData, category: e.target.value})}>
                                                    {['Donasi', 'Konsumsi', 'Perlengkapan', 'Operasional'].map(c => <option key={c} value={c}>{c}</option>)}
                                                </select>
                                            </div>
                                            <input type="text" required placeholder="Keterangan..." className="w-full p-4 bg-slate-50 rounded-2xl font-bold border-none outline-none" value={formData.description} onChange={(e) => setFormData({...formData, description: e.target.value})} />
                                            <input type="number" required placeholder="Nominal Rp..." className="w-full p-4 bg-slate-50 rounded-2xl font-black text-xl border-none outline-none" value={formData.amount} onChange={(e) => setFormData({...formData, amount: e.target.value})} />
                                            <button type="submit" disabled={loading} className="w-full py-5 bg-blue-600 text-white rounded-2xl font-black uppercase text-xs tracking-widest disabled:opacity-50">{loading ? 'Mengirim...' : 'Simpan Transaksi'}</button>
                                        </form>
                                    </div>
                                )}
                            </main>

                            {/* FOOTER BARU */}
                            <footer className="no-print bg-white border-t border-slate-100 mt-auto">
                                <div className="max-w-6xl mx-auto px-6 py-10 grid grid-cols-1 md:grid-cols-3 gap-8 text-center md:text-left">
                                    <div className="space-y-4">
                                        <h4 className="text-green-800 font-black text-sm tracking-tight">PONPES MABDA'IL FALAH</h4>
                                        <p className="text-slate-500 text-xs font-bold leading-relaxed max-w-xs mx-auto md:mx-0">
                                            Lembaga Pendidikan Islam yang berfokus pada pembinaan karakter dan keilmuan agama berlandaskan Ahlussunnah wal Jama'ah.
                                        </p>
                                    </div>
                                    <div className="space-y-4">
                                        <h4 className="text-slate-800 font-black text-xs uppercase tracking-widest">Alamat Lengkap</h4>
                                        <div className="flex flex-col gap-2 text-slate-500 text-xs font-bold">
                                            <div className="flex items-center gap-2 justify-center md:justify-start">
                                                <i data-lucide="map-pin" className="w-3 h-3 text-green-600"></i>
                                                <span>Kp. Tanjakan RT. 009/002</span>
                                            </div>
                                            <p className="ml-0 md:ml-5">Desa Tanjakan, Kec. Rajeg</p>
                                            <p className="ml-0 md:ml-5">Kabupaten Tangerang, Banten 15510</p>
                                        </div>
                                    </div>
                                    <div className="space-y-4">
                                        <h4 className="text-slate-800 font-black text-xs uppercase tracking-widest">Kontak & Sosmed</h4>
                                        <div className="flex flex-col gap-2 text-slate-500 text-xs font-bold">
                                            <div className="flex items-center gap-2 justify-center md:justify-start">
                                                <i data-lucide="phone" className="w-3 h-3 text-green-600"></i>
                                                <span>+62 812-XXXX-XXXX</span>
                                            </div>
                                            <div className="flex items-center gap-3 mt-2 justify-center md:justify-start">
                                                <div className="p-2 bg-slate-50 rounded-lg text-slate-400 hover:text-green-600 cursor-pointer"><i data-lucide="instagram" className="w-4 h-4"></i></div>
                                                <div className="p-2 bg-slate-50 rounded-lg text-slate-400 hover:text-green-600 cursor-pointer"><i data-lucide="facebook" className="w-4 h-4"></i></div>
                                                <div className="p-2 bg-slate-50 rounded-lg text-slate-400 hover:text-green-600 cursor-pointer"><i data-lucide="globe" className="w-4 h-4"></i></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div className="bg-slate-50 py-4 border-t border-slate-100">
                                    <p className="text-center text-[9px] font-black text-slate-400 uppercase tracking-[0.2em]">
                                        © 2026 Mabdai'l Falah Media • Built with Love for Ummah
                                    </p>
                                </div>
                            </footer>
                        </div>
                    </div>

                    {/* Modal Login */}
                    {showLoginModal && (
                        <div className="fixed inset-0 z-[100] bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-sm rounded-[40px] p-10 shadow-2xl relative">
                                <button onClick={() => setShowLoginModal(false)} className="absolute top-8 right-8 text-slate-400"><i data-lucide="x"></i></button>
                                <div className="text-center mb-8">
                                    <i data-lucide="fingerprint" className="w-12 h-12 text-green-700 mx-auto mb-4"></i>
                                    <h3 className="text-xl font-black text-slate-800">Admin Login</h3>
                                </div>
                                <form onSubmit={handleLogin} className="space-y-4">
                                    {loginError && <div className="p-3 bg-red-50 text-red-500 text-[10px] font-black rounded-xl text-center">{loginError}</div>}
                                    <input type="text" placeholder="Username" className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none" value={loginData.username} onChange={(e) => setLoginData({...loginData, username: e.target.value})} />
                                    <input type="password" placeholder="Password" className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none" value={loginData.password} onChange={(e) => setLoginData({...loginData, password: e.target.value})} />
                                    <button type="submit" className="w-full py-4 bg-green-700 text-white rounded-2xl font-black uppercase text-xs tracking-widest mt-4">Verifikasi Akses</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
