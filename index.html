<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kas PHBI MABDA'IL FALAH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // --- KONFIGURASI ---
        // MASUKKAN URL WEB APP GOOGLE APPS SCRIPT ANDA DI SINI
        const GSHEET_URL = "https://script.google.com/macros/s/AKfycbxjdZ_BLUyAzBo1HYegWcawwyw9rnDwz6ZDCalks9A8oIt5YzhFoAPBdnWahPSm5c1V/exec"; 
        const ADMIN_USER = "admin";
        const ADMIN_PASS = "admin123";

        // Icons placeholder (Lucide)
        const Icon = ({ name, size = 20, className = "" }) => {
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [isAdmin, setIsAdmin] = useState(false);
            const [showLoginModal, setShowLoginModal] = useState(false);
            const [loginData, setLoginData] = useState({ username: '', password: '' });
            const [loginError, setLoginError] = useState('');
            const [view, setView] = useState('dashboard');
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [editingId, setEditingId] = useState(null);
            const [loading, setLoading] = useState(false);
            const [transactions, setTransactions] = useState([]);

            const [formData, setFormData] = useState({
                description: '',
                amount: '',
                type: 'in',
                category: 'Donasi',
                date: new Date().toISOString().split('T')[0]
            });

            useEffect(() => {
                fetchData();
                // Initialize lucide icons after render
                setTimeout(() => lucide.createIcons(), 500);
            }, []);

            useEffect(() => {
                lucide.createIcons();
            }, [view, isAdmin, showLoginModal, loading, transactions]);

            const fetchData = async () => {
                if (!GSHEET_URL) return;
                setLoading(true);
                try {
                    const response = await fetch(GSHEET_URL);
                    const data = await response.json();
                    // Sort descending by ID (newest first)
                    setTransactions(data.sort((a, b) => b.id - a.id));
                } catch (error) {
                    console.error("Gagal ambil data:", error);
                } finally {
                    setLoading(false);
                }
            };

            const handleLogin = (e) => {
                e.preventDefault();
                if (loginData.username === ADMIN_USER && loginData.password === ADMIN_PASS) {
                    setIsAdmin(true);
                    setShowLoginModal(false);
                    setLoginError('');
                    setLoginData({ username: '', password: '' });
                } else {
                    setLoginError('Username atau Password salah!');
                }
            };

            const handleLogout = () => {
                setIsAdmin(false);
                setView('dashboard');
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!GSHEET_URL) return alert("GSHEET_URL belum diisi di kode!");
                setLoading(true);

                const payload = {
                    ...formData,
                    amount: parseFloat(formData.amount),
                    id: editingId || Date.now(),
                    action: editingId ? 'edit' : 'add'
                };

                try {
                    await fetch(GSHEET_URL, {
                        method: 'POST',
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify(payload)
                    });
                    
                    
                    // Tunggu sebentar lalu refresh data
                    setTimeout(async () => {
                        await fetchData();
                        setEditingId(null);
                        setFormData({
                            description: '',
                            amount: '',
                            type: 'in',
                            category: 'Donasi',
                            date: new Date().toISOString().split('T')[0]
                        });
                        setView('history');
                    }, 1000);
                } catch (error) {
                    alert("Terjadi kesalahan saat menyimpan.");
                } finally {
                    setLoading(false);
                }
            };

            const deleteTransaction = async (id) => {
                if (!confirm("Hapus data ini?")) return;
                setLoading(true);
                try {
                    await fetch(GSHEET_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({ action: 'delete', id: id })
                    });
                    setTimeout(() => fetchData(), 1000);
                } catch (error) {
                    alert("Gagal menghapus.");
                }
            };

            const totalIn = transactions.filter(t => t.type === 'in').reduce((acc, curr) => acc + Number(curr.amount), 0);
            const totalOut = transactions.filter(t => t.type === 'out').reduce((acc, curr) => acc + Number(curr.amount), 0);
            const balance = totalIn - totalOut;

            const formatCurrency = (amount) => {
                return new Intl.NumberFormat('id-ID', {
                    style: 'currency',
                    currency: 'IDR',
                    minimumFractionDigits: 0
                }).format(amount || 0);
            };

            const filteredTransactions = transactions.filter(t => 
                t.description?.toString().toLowerCase().includes(searchTerm.toLowerCase())
            );

            return (
                <div className="flex h-screen bg-slate-50 font-sans">
                    {/* Sidebar */}
                    <aside className={`fixed inset-y-0 left-0 z-40 w-64 bg-white border-r transform transition-transform lg:translate-x-0 ${sidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        <div className="p-6 border-b text-center">
                            <h1 className="text-xl font-black text-green-700">MABDA'IL FALAH</h1>
                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Digital Kas G-Sheet</p>
                        </div>
                        <nav className="mt-6 px-4 space-y-1">
                            <button onClick={() => {setView('dashboard'); setSidebarOpen(false)}} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-sm ${view === 'dashboard' ? 'bg-green-700 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-50'}`}>
                                <Icon name="layout-dashboard"/> Dashboard
                            </button>
                            <button onClick={() => {setView('history'); setSidebarOpen(false)}} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-sm ${view === 'history' ? 'bg-green-700 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-50'}`}>
                                <Icon name="history"/> Laporan Riwayat
                            </button>
                            {isAdmin && (
                                <button onClick={() => {setView('add'); setSidebarOpen(false)}} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-sm ${view === 'add' ? 'bg-green-700 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-50'}`}>
                                    <Icon name="plus-circle"/> {editingId ? "Edit Data" : "Input Baru"}
                                </button>
                            )}
                        </nav>
                        <div className="absolute bottom-6 left-4 right-4 space-y-2">
                            <button onClick={fetchData} className="w-full py-2 bg-slate-100 text-slate-500 rounded-lg text-xs font-bold flex items-center justify-center gap-2">
                                <Icon name="refresh-cw" size={14} className={loading ? "animate-spin" : ""}/> Sync Database
                            </button>
                            {!isAdmin ? (
                                <button onClick={() => setShowLoginModal(true)} className="w-full py-3 bg-slate-800 text-white rounded-xl font-bold text-sm flex items-center justify-center gap-2">
                                    <Icon name="lock" size={16}/> Login Admin
                                </button>
                            ) : (
                                <button onClick={handleLogout} className="w-full py-3 text-red-600 font-bold text-sm flex items-center justify-center gap-2 hover:bg-red-50 rounded-xl">
                                    <Icon name="log-out" size={16}/> Logout
                                </button>
                            )}
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 lg:ml-64 p-4 md:p-8 overflow-y-auto">
                        <header className="flex items-center justify-between mb-8">
                            <h2 className="text-2xl font-black text-slate-800 uppercase">{view}</h2>
                            <button onClick={() => setSidebarOpen(true)} className="lg:hidden p-2 bg-green-700 text-white rounded-lg"><Icon name="menu"/></button>
                        </header>

                        {loading && (
                            <div className="fixed top-4 right-4 z-[100] bg-white border border-green-200 px-4 py-2 rounded-full shadow-xl flex items-center gap-2 text-xs font-bold text-green-700">
                                <Icon name="loader" className="animate-spin" size={14}/> Loading...
                            </div>
                        )}

                        {view === 'dashboard' && (
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                <div className="bg-green-700 p-6 rounded-2xl text-white shadow-xl relative overflow-hidden">
                                    <p className="text-white/70 text-[10px] font-bold uppercase mb-1">Saldo Kas</p>
                                    <h3 className="text-2xl font-black">{formatCurrency(balance)}</h3>
                                    <Icon name="wallet" size={60} className="absolute right-[-10px] bottom-[-10px] opacity-10" />
                                </div>
                                <div className="bg-blue-600 p-6 rounded-2xl text-white shadow-xl relative overflow-hidden">
                                    <p className="text-white/70 text-[10px] font-bold uppercase mb-1">Pemasukan</p>
                                    <h3 className="text-2xl font-black">{formatCurrency(totalIn)}</h3>
                                    <Icon name="arrow-up-circle" size={60} className="absolute right-[-10px] bottom-[-10px] opacity-10" />
                                </div>
                                <div className="bg-red-600 p-6 rounded-2xl text-white shadow-xl relative overflow-hidden">
                                    <p className="text-white/70 text-[10px] font-bold uppercase mb-1">Pengeluaran</p>
                                    <h3 className="text-2xl font-black">{formatCurrency(totalOut)}</h3>
                                    <Icon name="arrow-down-circle" size={60} className="absolute right-[-10px] bottom-[-10px] opacity-10" />
                                </div>
                            </div>
                        )}

                        {view === 'history' && (
                            <div className="bg-white rounded-2xl border shadow-sm overflow-hidden">
                                <div className="p-4 border-b flex items-center justify-between bg-slate-50">
                                    <div className="relative w-full max-w-xs">
                                        <Icon name="search" size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
                                        <input type="text" placeholder="Cari transaksi..." className="w-full pl-10 pr-4 py-2 rounded-lg border text-sm outline-none" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                                    </div>
                                    <button onClick={() => window.print()} className="ml-4 p-2 bg-white border rounded-lg text-slate-600"><Icon name="download" size={18}/></button>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left text-sm">
                                        <thead className="bg-slate-50 text-slate-400 uppercase text-[10px] font-bold">
                                            <tr>
                                                <th className="px-6 py-4">Tgl</th>
                                                <th className="px-6 py-4">Deskripsi</th>
                                                <th className="px-6 py-4">Kategori</th>
                                                <th className="px-6 py-4 text-right">Nominal</th>
                                                {isAdmin && <th className="px-6 py-4 text-center">Aksi</th>}
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100 font-medium">
                                            {filteredTransactions.map((t, idx) => (
                                                <tr key={idx} className="hover:bg-slate-50">
                                                    <td className="px-6 py-4 text-slate-400 text-xs">{t.date}</td>
                                                    <td className="px-6 py-4 font-bold text-slate-700">{t.description}</td>
                                                    <td className="px-6 py-4"><span className="px-2 py-1 bg-slate-100 rounded text-[10px] uppercase">{t.category}</span></td>
                                                    <td className={`px-6 py-4 text-right font-black ${t.type === 'in' ? 'text-green-600' : 'text-red-600'}`}>
                                                        {formatCurrency(t.amount)}
                                                    </td>
                                                    {isAdmin && (
                                                        <td className="px-6 py-4 flex items-center justify-center gap-2">
                                                            <button onClick={() => {setFormData({...t}); setEditingId(t.id); setView('add')}} className="p-1 text-blue-500"><Icon name="edit" size={16}/></button>
                                                            <button onClick={() => deleteTransaction(t.id)} className="p-1 text-red-500"><Icon name="trash-2" size={16}/></button>
                                                        </td>
                                                    )}
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {view === 'add' && isAdmin && (
                            <div className="max-w-xl mx-auto bg-white p-8 rounded-2xl border shadow-lg">
                                <form onSubmit={handleSubmit} className="space-y-4">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="text-[10px] font-bold text-slate-400 uppercase">Jenis</label>
                                            <select className="w-full p-3 border rounded-xl bg-slate-50 font-bold" value={formData.type} onChange={(e) => setFormData({...formData, type: e.target.value})}>
                                                <option value="in">Pemasukan (+)</option>
                                                <option value="out">Pengeluaran (-)</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-bold text-slate-400 uppercase">Kategori</label>
                                            <select className="w-full p-3 border rounded-xl bg-slate-50 font-bold" value={formData.category} onChange={(e) => setFormData({...formData, category: e.target.value})}>
                                                <option value="Donasi">Donasi</option>
                                                <option value="Sponsorship">Sponsorship</option>
                                                <option value="Konsumsi">Konsumsi</option>
                                                <option value="Perlengkapan">Perlengkapan</option>
                                                <option value="Honor">Bisyaroh/Honor</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-400 uppercase">Keterangan</label>
                                        <input type="text" required className="w-full p-3 border rounded-xl" value={formData.description} onChange={(e) => setFormData({...formData, description: e.target.value})} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="text-[10px] font-bold text-slate-400 uppercase">Nominal (Rp)</label>
                                            <input type="number" required className="w-full p-3 border rounded-xl font-bold" value={formData.amount} onChange={(e) => setFormData({...formData, amount: e.target.value})} />
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-bold text-slate-400 uppercase">Tanggal</label>
                                            <input type="date" className="w-full p-3 border rounded-xl" value={formData.date} onChange={(e) => setFormData({...formData, date: e.target.value})} />
                                        </div>
                                    </div>
                                    <div className="flex gap-2 pt-4">
                                        {editingId && <button type="button" onClick={() => {setEditingId(null); setView('history')}} className="flex-1 py-3 bg-slate-100 rounded-xl font-bold">Batal</button>}
                                        <button type="submit" className="flex-[2] py-4 bg-green-700 text-white rounded-xl font-black shadow-lg shadow-green-100">SIMPAN DATA</button>
                                    </div>
                                </form>
                            </div>
                        )}
                    </main>

                    {/* Modal Login */}
                    {showLoginModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-sm rounded-3xl p-8 shadow-2xl">
                                <h2 className="text-xl font-black text-center mb-6">ADMIN LOGIN</h2>
                                <form onSubmit={handleLogin} className="space-y-4">
                                    {loginError && <p className="text-xs text-red-500 text-center font-bold">{loginError}</p>}
                                    <input type="text" placeholder="Username" className="w-full p-4 border rounded-2xl bg-slate-50 font-bold outline-none focus:border-green-600" value={loginData.username} onChange={(e) => setLoginData({...loginData, username: e.target.value})} />
                                    <input type="password" placeholder="Password" className="w-full p-4 border rounded-2xl bg-slate-50 font-bold outline-none focus:border-green-600" value={loginData.password} onChange={(e) => setLoginData({...loginData, password: e.target.value})} />
                                    <button className="w-full py-4 bg-green-700 text-white rounded-2xl font-black shadow-xl">MASUK</button>
                                    <button type="button" onClick={() => setShowLoginModal(false)} className="w-full text-slate-400 font-bold text-sm">Kembali</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
