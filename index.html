<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kas PHBI - MABDA'IL FALAH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .marquee {
            white-space: nowrap;
            overflow: hidden;
            box-sizing: border-box;
        }
        .marquee p {
            display: inline-block;
            padding-left: 100%;
            animation: marquee 25s linear infinite;
        }
        @keyframes marquee {
            0%   { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .hero-gradient {
            background: linear-gradient(rgba(21, 128, 61, 0.8), rgba(6, 78, 59, 0.9)), 
                        url('https://images.unsplash.com/photo-1590076214667-cda43224346c?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const GSHEET_URL = "https://script.google.com/macros/s/AKfycbw488C_jSYN96tRoU9nM-tBbCiqOV1xBAd68uaxa2fn4dQ52_ylzWos1-7YvmtFAQEt/exec"; 
        const ADMIN_USER = "admin";
        const ADMIN_PASS = "admin123";

        const Icon = ({ name, size = 20, className = "" }) => {
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [isAdmin, setIsAdmin] = useState(false);
            const [showLoginModal, setShowLoginModal] = useState(false);
            const [loginData, setLoginData] = useState({ username: '', password: '' });
            const [loginError, setLoginError] = useState('');
            const [view, setView] = useState('dashboard');
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [editingId, setEditingId] = useState(null);
            const [loading, setLoading] = useState(false);
            const [transactions, setTransactions] = useState([]);
            const [currentTime, setCurrentTime] = useState(new Date());

            const [formData, setFormData] = useState({
                description: '',
                amount: '',
                type: 'in',
                category: 'Donasi',
                date: new Date().toISOString().split('T')[0]
            });

            // Update Time
            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                fetchData();
                setTimeout(() => lucide.createIcons(), 500);
            }, []);

            useEffect(() => {
                lucide.createIcons();
            }, [view, isAdmin, showLoginModal, loading, transactions]);

            const fetchData = async () => {
                if (!GSHEET_URL) return;
                setLoading(true);
                try {
                    const response = await fetch(GSHEET_URL);
                    const data = await response.json();
                    setTransactions(data.sort((a, b) => b.id - a.id));
                } catch (error) {
                    console.error("Gagal ambil data:", error);
                } finally {
                    setLoading(false);
                }
            };

            const handleLogin = (e) => {
                e.preventDefault();
                if (loginData.username === ADMIN_USER && loginData.password === ADMIN_PASS) {
                    setIsAdmin(true);
                    setShowLoginModal(false);
                    setLoginError('');
                } else {
                    setLoginError('Username atau Password salah!');
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                const payload = { ...formData, amount: parseFloat(formData.amount), id: editingId || Date.now(), action: editingId ? 'edit' : 'add' };
                try {
                    const res = await fetch(GSHEET_URL, {
                        method: "POST",
                        body: JSON.stringify(payload)
                    });
                    const result = await res.json();
                    if (result.status === "success") {
                        await fetchData();
                        setEditingId(null);
                        setFormData({ description: '', amount: '', type: 'in', category: 'Donasi', date: new Date().toISOString().split('T')[0] });
                        setView('history');
                    }
                } catch (err) { alert("Terjadi kesalahan."); }
            };

            const totalIn = transactions.filter(t => t.type === 'in').reduce((acc, curr) => acc + Number(curr.amount), 0);
            const totalOut = transactions.filter(t => t.type === 'out').reduce((acc, curr) => acc + Number(curr.amount), 0);
            const balance = totalIn - totalOut;

            const formatCurrency = (amount) => {
                return new Intl.NumberFormat('id-ID', {
                    style: 'currency',
                    currency: 'IDR',
                    minimumFractionDigits: 0
                }).format(amount || 0);
            };

            const filteredTransactions = transactions.filter(t => 
                t.description?.toString().toLowerCase().includes(searchTerm.toLowerCase())
            );

            return (
                <div className="flex min-h-screen bg-slate-50">
                    {/* Sidebar */}
                    <aside className={`fixed inset-y-0 left-0 z-50 w-72 bg-white border-r border-slate-200 transform transition-all duration-300 lg:translate-x-0 ${sidebarOpen ? 'translate-x-0 shadow-2xl' : '-translate-x-full'}`}>
                        <div className="p-8 border-b">
                            <div className="flex items-center gap-3 mb-2 justify-center">
                                <div className="bg-green-700 p-2 rounded-xl">
                                    <Icon name="mosque" className="text-white" size={24} />
                                </div>
                                <h1 className="text-xl font-extrabold text-green-800 tracking-tight">MABDA'IL FALAH</h1>
                            </div>
                            <p className="text-[10px] font-bold text-slate-400 text-center uppercase tracking-[0.2em]">Digital Finance PHBI</p>
                        </div>
                        
                        <nav className="mt-8 px-6 space-y-2">
                            <button onClick={() => {setView('dashboard'); setSidebarOpen(false)}} className={`w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl font-bold transition-all ${view === 'dashboard' ? 'bg-green-700 text-white shadow-lg shadow-green-200' : 'text-slate-500 hover:bg-slate-50'}`}>
                                <Icon name="layout-dashboard" size={20}/> Dashboard
                            </button>
                            <button onClick={() => {setView('history'); setSidebarOpen(false)}} className={`w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl font-bold transition-all ${view === 'history' ? 'bg-green-700 text-white shadow-lg shadow-green-200' : 'text-slate-500 hover:bg-slate-50'}`}>
                                <Icon name="list-ordered" size={20}/> Laporan Riwayat
                            </button>
                            <button onClick={() => {setView('struktur'); setSidebarOpen(false)}} className={`w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl font-bold transition-all ${view === 'struktur' ? 'bg-green-700 text-white shadow-lg shadow-green-200' : 'text-slate-500 hover:bg-slate-50'}`}>
                                <Icon name="users" size={20}/> Kepengurusan
                            </button>
                            {isAdmin && (
                                <button onClick={() => {setView('add'); setSidebarOpen(false)}} className={`w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl font-bold transition-all ${view === 'add' ? 'bg-green-700 text-white shadow-lg shadow-green-200' : 'text-slate-500 hover:bg-slate-50'}`}>
                                    <Icon name="plus-square" size={20}/> {editingId ? "Edit Transaksi" : "Input Baru"}
                                </button>
                            )}
                        </nav>

                        <div className="absolute bottom-8 left-6 right-6 space-y-3">
                            <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100 mb-4">
                                <p className="text-[10px] text-slate-400 font-bold uppercase mb-1">Status Server</p>
                                <div className="flex items-center gap-2">
                                    <div className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                                    <span className="text-xs font-bold text-slate-600">Online & Sinkron</span>
                                </div>
                            </div>
                            {!isAdmin ? (
                                <button onClick={() => setShowLoginModal(true)} className="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold text-sm flex items-center justify-center gap-3 transition-transform active:scale-95 shadow-xl shadow-slate-200">
                                    <Icon name="shield-check" size={18}/> Login Admin
                                </button>
                            ) : (
                                <button onClick={() => setIsAdmin(false)} className="w-full py-4 bg-red-50 text-red-600 rounded-2xl font-bold text-sm flex items-center justify-center gap-3 hover:bg-red-100 transition-all">
                                    <Icon name="log-out" size={18}/> Logout
                                </button>
                            )}
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 lg:ml-72 flex flex-col min-h-screen">
                        
                        {/* Top Bar - JAM & RUNNING TEXT */}
                        <div className="bg-green-900 text-white py-2 px-6 flex flex-wrap items-center justify-between gap-4 sticky top-0 z-40 shadow-md">
                            <div className="flex items-center gap-3 bg-white/10 px-4 py-1.5 rounded-full glass-effect border border-white/20">
                                <Icon name="clock" size={16} className="text-green-300" />
                                <span className="text-sm font-black tracking-widest leading-none">
                                    {currentTime.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}
                                </span>
                            </div>
                            <div className="flex-1 overflow-hidden marquee relative">
                                <p className="text-sm font-medium tracking-wide">
                                    <span className="mx-4">🌟 Pengumuman: Laporan Kas PHBI MABDA'IL FALAH Ter-update Setiap Hari.</span>
                                    <span className="mx-4">🕌 Mari Berdonasi Untuk Kelancaran Acara PHBI Kita Melalui Bendahara.</span>
                                    <span className="mx-4">📅 Update Hari Ini: {currentTime.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</span>
                                </p>
                            </div>
                        </div>

                        {/* Mobile Header */}
                        <header className="lg:hidden p-4 flex items-center justify-between bg-white border-b sticky top-12 z-40">
                            <h2 className="text-lg font-black text-green-800">MABDA'IL FALAH</h2>
                            <button onClick={() => setSidebarOpen(true)} className="p-2 bg-green-700 text-white rounded-xl shadow-lg">
                                <Icon name="menu"/>
                            </button>
                        </header>

                        <div className="p-4 md:p-8 flex-1">
                            {/* Hero Banner Web */}
                            <div className="relative h-48 md:h-64 rounded-[2rem] mb-8 overflow-hidden hero-gradient shadow-2xl shadow-green-200 flex flex-col justify-end p-8 border-4 border-white">
                                <div className="absolute top-6 left-8 bg-green-600/30 backdrop-blur-md px-4 py-1.5 rounded-full border border-white/30">
                                    <p className="text-white text-[10px] font-bold tracking-[0.2em] uppercase">Pondok Pesantren</p>
                                </div>
                                <h1 className="text-white text-3xl md:text-5xl font-black mb-2 drop-shadow-lg">Kas Digital PHBI</h1>
                                <p className="text-white/80 text-sm md:text-lg font-medium max-w-xl">Transparansi Keuangan Panitia Hari Besar Islam Pondok Pesantren Mabda'il Falah Tanjakan.</p>
                            </div>

                            {/* View Content */}
                            {view === 'dashboard' && (
                                <>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                                        <div className="group bg-white p-7 rounded-[2rem] border border-slate-100 shadow-sm hover:shadow-xl transition-all duration-300 relative overflow-hidden">
                                            <div className="absolute top-0 right-0 w-32 h-32 bg-green-50 rounded-bl-full -mr-16 -mt-16 group-hover:scale-110 transition-transform"></div>
                                            <p className="text-slate-400 text-xs font-bold uppercase mb-2 tracking-wider">Saldo Tersedia</p>
                                            <h3 className="text-3xl font-extrabold text-green-700 relative z-10">{formatCurrency(balance)}</h3>
                                            <div className="mt-4 flex items-center gap-2 text-[10px] font-bold text-green-600 bg-green-50 w-max px-3 py-1 rounded-full">
                                                <Icon name="shield" size={12}/> AMAN
                                            </div>
                                        </div>
                                        <div className="bg-white p-7 rounded-[2rem] border border-slate-100 shadow-sm hover:shadow-xl transition-all duration-300">
                                            <p className="text-slate-400 text-xs font-bold uppercase mb-2 tracking-wider">Total Pemasukan</p>
                                            <h3 className="text-3xl font-extrabold text-blue-600">{formatCurrency(totalIn)}</h3>
                                            <p className="mt-2 text-[10px] text-slate-400 font-bold italic">Akumulasi seluruh donasi</p>
                                        </div>
                                        <div className="bg-white p-7 rounded-[2rem] border border-slate-100 shadow-sm hover:shadow-xl transition-all duration-300">
                                            <p className="text-slate-400 text-xs font-bold uppercase mb-2 tracking-wider">Total Pengeluaran</p>
                                            <h3 className="text-3xl font-extrabold text-red-600">{formatCurrency(totalOut)}</h3>
                                            <p className="mt-2 text-[10px] text-slate-400 font-bold italic">Beban operasional & acara</p>
                                        </div>
                                    </div>

                                    {/* Recent Activity Mini List */}
                                    <div className="bg-white rounded-[2rem] border border-slate-100 shadow-sm p-8">
                                        <div className="flex items-center justify-between mb-6">
                                            <h2 className="text-xl font-black text-slate-800">Aktivitas Terkini</h2>
                                            <button onClick={() => setView('history')} className="text-green-700 text-sm font-bold hover:underline">Lihat Semua</button>
                                        </div>
                                        <div className="space-y-4">
                                            {transactions.slice(0, 5).map((t, idx) => (
                                                <div key={idx} className="flex items-center justify-between p-4 bg-slate-50 rounded-2xl hover:bg-slate-100 transition-all border border-transparent hover:border-slate-200">
                                                    <div className="flex items-center gap-4">
                                                        <div className={`p-3 rounded-xl ${t.type === 'in' ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}`}>
                                                            <Icon name={t.type === 'in' ? 'trending-up' : 'trending-down'} size={20} />
                                                        </div>
                                                        <div>
                                                            <p className="font-bold text-slate-700">{t.description}</p>
                                                            <p className="text-[10px] text-slate-400 font-bold">{t.date} • {t.category}</p>
                                                        </div>
                                                    </div>
                                                    <p className={`font-black ${t.type === 'in' ? 'text-green-600' : 'text-red-600'}`}>
                                                        {t.type === 'in' ? '+' : '-'}{formatCurrency(t.amount)}
                                                    </p>
                                                </div>
                                            ))}
                                            {transactions.length === 0 && <p className="text-center py-10 text-slate-400 font-medium">Belum ada data transaksi.</p>}
                                        </div>
                                    </div>
                                </>
                            )}

                            {view === 'history' && (
                                <div className="bg-white rounded-[2rem] border border-slate-100 shadow-sm overflow-hidden">
                                    <div className="p-6 border-b flex flex-wrap items-center justify-between gap-4">
                                        <div className="relative w-full md:w-80">
                                            <Icon name="search" size={18} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />
                                            <input type="text" placeholder="Cari transaksi..." className="w-full pl-12 pr-4 py-3.5 rounded-2xl bg-slate-50 border-none outline-none focus:ring-2 focus:ring-green-700/20 transition-all font-medium text-sm" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <button onClick={() => window.print()} className="px-5 py-3.5 bg-white border border-slate-200 rounded-2xl text-slate-600 font-bold text-sm flex items-center gap-2 hover:bg-slate-50"><Icon name="printer" size={18}/> Cetak Laporan</button>
                                        </div>
                                    </div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left border-collapse">
                                            <thead className="bg-slate-50 text-slate-400 uppercase text-[10px] font-black tracking-widest">
                                                <tr>
                                                    <th className="px-8 py-5">Tanggal</th>
                                                    <th className="px-8 py-5">Keterangan</th>
                                                    <th className="px-8 py-5">Kategori</th>
                                                    <th className="px-8 py-5 text-right">Nominal</th>
                                                    {isAdmin && <th className="px-8 py-5 text-center">Opsi</th>}
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50">
                                                {filteredTransactions.map((t, idx) => (
                                                    <tr key={idx} className="hover:bg-green-50/30 transition-colors">
                                                        <td className="px-8 py-5 text-xs font-bold text-slate-500">{t.date}</td>
                                                        <td className="px-8 py-5 font-bold text-slate-800">{t.description}</td>
                                                        <td className="px-8 py-5">
                                                            <span className="px-3 py-1 bg-slate-100 rounded-full text-[10px] font-black uppercase text-slate-500">{t.category}</span>
                                                        </td>
                                                        <td className={`px-8 py-5 text-right font-black ${t.type === 'in' ? 'text-green-600' : 'text-red-600'}`}>
                                                            {t.type === 'in' ? '+' : '-'}{formatCurrency(t.amount)}
                                                        </td>
                                                        {isAdmin && (
                                                            <td className="px-8 py-5 flex items-center justify-center gap-2">
                                                                <button onClick={() => {setFormData({...t}); setEditingId(t.id); setView('add')}} className="p-2 text-blue-500 hover:bg-blue-50 rounded-lg"><Icon name="edit-3" size={18}/></button>
                                                                <button className="p-2 text-red-500 hover:bg-red-50 rounded-lg"><Icon name="trash-2" size={18}/></button>
                                                            </td>
                                                        )}
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {view === 'struktur' && (
                                <div className="max-w-4xl mx-auto space-y-8">
                                    <div className="text-center">
                                        <h2 className="text-3xl font-black text-slate-800 mb-2">Struktur Pengurus PHBI</h2>
                                        <p className="text-slate-500 font-medium">Periode 2024 - 2025</p>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        {[
                                            { role: 'Ketua Pelaksana', name: 'Ust. Fullan bin Fullan', color: 'bg-green-700' },
                                            { role: 'Sekretaris', name: 'Kang Ahmad Santri', color: 'bg-slate-700' },
                                            { role: 'Bendahara', name: 'Kang Yusuf Artha', color: 'bg-blue-700' },
                                            { role: 'Seksi Acara', name: 'Kang Zainuddin', color: 'bg-orange-600' }
                                        ].map((item, i) => (
                                            <div key={i} className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm flex items-center gap-6">
                                                <div className={`w-16 h-16 ${item.color} rounded-2xl flex items-center justify-center text-white`}>
                                                    <Icon name="user" size={32}/>
                                                </div>
                                                <div>
                                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">{item.role}</p>
                                                    <p className="text-lg font-bold text-slate-800">{item.name}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {view === 'add' && isAdmin && (
                                <div className="max-w-2xl mx-auto bg-white p-10 rounded-[2.5rem] border border-slate-100 shadow-2xl">
                                    <div className="flex items-center gap-4 mb-8">
                                        <div className="bg-green-100 text-green-700 p-3 rounded-2xl">
                                            <Icon name="file-plus" size={24}/>
                                        </div>
                                        <h2 className="text-2xl font-black text-slate-800">{editingId ? "Ubah Data" : "Entri Transaksi Baru"}</h2>
                                    </div>
                                    <form onSubmit={handleSubmit} className="space-y-6">
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            <div className="space-y-2">
                                                <label className="text-xs font-black text-slate-400 uppercase ml-2">Jenis Arus Kas</label>
                                                <select className="w-full p-4 border-2 border-slate-50 rounded-2xl bg-slate-50 font-bold focus:border-green-600 outline-none transition-all" value={formData.type} onChange={(e) => setFormData({...formData, type: e.target.value})}>
                                                    <option value="in">Dana Masuk (+)</option>
                                                    <option value="out">Dana Keluar (-)</option>
                                                </select>
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-xs font-black text-slate-400 uppercase ml-2">Kategori</label>
                                                <select className="w-full p-4 border-2 border-slate-50 rounded-2xl bg-slate-50 font-bold focus:border-green-600 outline-none transition-all" value={formData.category} onChange={(e) => setFormData({...formData, category: e.target.value})}>
                                                    <option value="Donasi">Donasi</option>
                                                    <option value="Sponsorship">Sponsorship</option>
                                                    <option value="Konsumsi">Konsumsi</option>
                                                    <option value="Perlengkapan">Perlengkapan</option>
                                                    <option value="Honor">Bisyaroh/Honor</option>
                                                </select>
                                            </div>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-xs font-black text-slate-400 uppercase ml-2">Deskripsi Transaksi</label>
                                            <input type="text" placeholder="Contoh: Donasi Hamba Allah" required className="w-full p-4 border-2 border-slate-50 rounded-2xl bg-slate-50 font-bold focus:border-green-600 outline-none transition-all" value={formData.description} onChange={(e) => setFormData({...formData, description: e.target.value})} />
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            <div className="space-y-2">
                                                <label className="text-xs font-black text-slate-400 uppercase ml-2">Nominal (IDR)</label>
                                                <input type="number" required placeholder="0" className="w-full p-4 border-2 border-slate-50 rounded-2xl bg-slate-50 font-black text-lg text-green-700 focus:border-green-600 outline-none transition-all" value={formData.amount} onChange={(e) => setFormData({...formData, amount: e.target.value})} />
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-xs font-black text-slate-400 uppercase ml-2">Tanggal</label>
                                                <input type="date" className="w-full p-4 border-2 border-slate-50 rounded-2xl bg-slate-50 font-bold focus:border-green-600 outline-none transition-all" value={formData.date} onChange={(e) => setFormData({...formData, date: e.target.value})} />
                                            </div>
                                        </div>
                                        <div className="flex gap-4 pt-4">
                                            {editingId && <button type="button" onClick={() => {setEditingId(null); setView('history')}} className="flex-1 py-4 bg-slate-100 text-slate-500 rounded-2xl font-bold hover:bg-slate-200 transition-all">Batal</button>}
                                            <button type="submit" className="flex-[2] py-4 bg-green-700 text-white rounded-2xl font-black shadow-xl shadow-green-100 hover:scale-[1.02] active:scale-95 transition-all">SIMPAN DATA</button>
                                        </div>
                                    </form>
                                </div>
                            )}
                        </div>

                        {/* FOOTER */}
                        <footer className="mt-auto bg-white border-t border-slate-100 p-8 md:p-12">
                            <div className="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-10">
                                <div>
                                    <div className="flex items-center gap-2 mb-4">
                                        <div className="bg-green-700 p-1.5 rounded-lg">
                                            <Icon name="mosque" className="text-white" size={18} />
                                        </div>
                                        <h3 className="font-black text-green-800">MABDA'IL FALAH</h3>
                                    </div>
                                    <p className="text-sm text-slate-500 font-medium leading-relaxed">
                                        Pondok Pesantren MABDA'IL FALAH Tanjakan berdedikasi dalam mencetak generasi Robbani yang mandiri dan berakhlak mulia.
                                    </p>
                                </div>
                                <div>
                                    <h4 className="font-bold text-slate-800 mb-4 uppercase text-xs tracking-widest">Kontak Kami</h4>
                                    <ul className="space-y-2 text-sm text-slate-500 font-medium">
                                        <li className="flex items-center gap-2"><Icon name="map-pin" size={14}/> Kp. Tanjakan, Desa Tanjakan, Indonesia</li>
                                        <li className="flex items-center gap-2"><Icon name="phone" size={14}/> +62 812-3456-7890</li>
                                        <li className="flex items-center gap-2"><Icon name="mail" size={14}/> info@mabdailfalah.com</li>
                                    </ul>
                                </div>
                                <div>
                                    <h4 className="font-bold text-slate-800 mb-4 uppercase text-xs tracking-widest">Media Sosial</h4>
                                    <div className="flex gap-4">
                                        <div className="w-10 h-10 bg-slate-50 rounded-xl flex items-center justify-center text-slate-400 hover:text-green-700 hover:bg-green-50 transition-all cursor-pointer"><Icon name="facebook" size={18}/></div>
                                        <div className="w-10 h-10 bg-slate-50 rounded-xl flex items-center justify-center text-slate-400 hover:text-green-700 hover:bg-green-50 transition-all cursor-pointer"><Icon name="instagram" size={18}/></div>
                                        <div className="w-10 h-10 bg-slate-50 rounded-xl flex items-center justify-center text-slate-400 hover:text-green-700 hover:bg-green-50 transition-all cursor-pointer"><Icon name="youtube" size={18}/></div>
                                    </div>
                                </div>
                            </div>
                            <div className="max-w-6xl mx-auto border-t border-slate-50 mt-10 pt-8 flex flex-col md:flex-row justify-between items-center gap-4">

                    {showLoginModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-md">

                                <div className="absolute top-0 left-0 w-full h-2 bg-green-700"></div>
                                <div className="text-center mb-8">
                                    <div className="w-16 h-16 bg-green-50 text-green-700 rounded-2xl flex items-center justify-center mx-auto mb-4">
                                        <Icon name="lock" size={32}/>
                                    </div>
                                    <h2 className="text-2xl font-black text-slate-800">Admin Login</h2>
                                    <p className="text-sm text-slate-400 font-bold mt-1 tracking-wide">Akses terbatas pengurus kas</p>
                                </div>
                                <form onSubmit={handleLogin} className="space-y-4">
                                    {loginError && <div className="p-3 bg-red-50 text-red-500 text-[10px] rounded-xl text-center font-black border border-red-100 mb-2">{loginError}</div>}
                                    <div className="space-y-1">
                                        <input type="text" placeholder="Username" className="w-full p-4 border-2 border-slate-50 rounded-2xl bg-slate-50 font-bold outline-none focus:border-green-600 transition-all text-sm" value={loginData.username} onChange={(e) => setLoginData({...loginData, username: e.target.value})} />
                                    </div>
                                    <div className="space-y-1">
                                        <input type="password" placeholder="Password" className="w-full p-4 border-2 border-slate-50 rounded-2xl bg-slate-50 font-bold outline-none focus:border-green-600 transition-all text-sm" value={loginData.password} onChange={(e) => setLoginData({...loginData, password: e.target.value})} />

                                    <button type="button" onClick={() => setShowLoginModal(false)} className="w-full text-slate-400 font-bold text-xs mt-2 hover:text-slate-600 transition-colors uppercase tracking-widest">Batalkan</button>
                                </form>
                            </div>

        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
