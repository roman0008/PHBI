<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pondok Pesantren Mabda'il Falah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .hero-gradient {
            background: linear-gradient(135deg, #064e3b 0%, #065f46 100%);
        }

        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .nav-link-active {
            color: #065f46;
            border-bottom: 2px solid #065f46;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-thumb {
            background: #059669;
            border-radius: 10px;
        }

        .bg-grid {
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .profile-card:hover .profile-img {
            transform: scale(1.05);
        }

        .admin-tab-active {
            background-color: #064e3b;
            color: white;
            box-shadow: 0 10px 15px -3px rgba(6, 78, 59, 0.2);
        }

        .logout-btn:hover {
            background-color: #fee2e2;
            color: #ef4444;
        }

        .text-income { color: #059669; }
        .text-expense { color: #dc2626; }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const GSHEET_URL = "https://script.google.com/macros/s/AKfycbyjQjA3aja6XbLWKChoJ4FrO0O8Tt3t9zbdk7Qx1tNfrP9J66UJaKWVmzEB90OQR-Hg/exec"; 
        const ADMIN_USER = "mabdail_admin";
        const ADMIN_PASS = "Mabda2026!PHBI";

        const App = () => {
            const [view, setView] = useState('beranda'); 
            const [isAdmin, setIsAdmin] = useState(false);
            const [showLogin, setShowLogin] = useState(false);
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [showPassword, setShowPassword] = useState(false);
            const [currentTime, setCurrentTime] = useState(new Date());
            
            const [transactions, setTransactions] = useState([]);
            const [gallery, setGallery] = useState([]);
            const [pengurus, setPengurus] = useState([]);
            const [infoIndex, setInfoIndex] = useState(0);
            const [isLoading, setIsLoading] = useState(false);

            const [adminTab, setAdminTab] = useState('kas'); 
            const [editingId, setEditingId] = useState(null);
            const [formData, setFormData] = useState({});

            const infoHighlights = useMemo(() => [
                { icon: 'info', text: "Selamat Datang di Portal Resmi Mabda'il Falah" },
                { icon: 'map-pin', text: "Kp. Tanjakan Rajeg, Tangerang, Banten" },
                { icon: 'graduation-cap', text: "Penerimaan Santri Baru (PSB) 2026/2027 Telah Dibuka" },
                { icon: 'megaphone', text: "Ayo Berinfaq untuk Pembangunan Fasilitas Santri" },
                { icon: 'shield-check', text: "Menjaga Tradisi, Membangun Generasi Qur'ani" }
            ], []);

            useEffect(() => {
                fetchAllData();
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                const infoTimer = setInterval(() => {
                    setInfoIndex((prev) => (prev + 1) % infoHighlights.length);
                }, 5000);

                return () => {
                    clearInterval(timer);
                    clearInterval(infoTimer);
                };
            }, [infoHighlights]);

            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [view, showLogin, isAdmin, isMenuOpen, infoIndex, isLoading, pengurus, adminTab, editingId, showPassword, transactions, currentTime]);

            const fetchAllData = async () => {
                setIsLoading(true);
                try {
                    const [resKas, resGal, resPeng] = await Promise.all([
                        fetch(`${GSHEET_URL}?sheet=Sheet1`),
                        fetch(`${GSHEET_URL}?sheet=galeri`),
                        fetch(`${GSHEET_URL}?sheet=pengurus`)
                    ]);
                    
                    const dKas = await resKas.json();
                    const dGal = await resGal.json();
                    const dPeng = await resPeng.json();

                    setTransactions(Array.isArray(dKas) ? dKas : []);
                    setGallery(Array.isArray(dGal) ? dGal : []);
                    setPengurus(Array.isArray(dPeng) ? dPeng : []);
                } catch (e) {
                    console.error("Fetch failed", e);
                }
                setIsLoading(false);
            };

            const handleCrudAction = async (action, sheetName, data = null) => {
                setIsLoading(true);
                const payload = {
                    action: action,
                    sheet: sheetName,
                    data: data || formData
                };

                try {
                    const res = await fetch(GSHEET_URL, {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });
                    await fetchAllData();
                    setEditingId(null);
                    setFormData({});
                } catch (e) {
                    console.error("CRUD Action failed", e);
                }
                setIsLoading(false);
            };

            const formatRupiah = (number) => {
                return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(number);
            };

            const formatShortDate = (date) => {
                const dayNames = ["MIN", "SEN", "SEL", "RAB", "KAM", "JUM", "SAB"];
                const d = String(date.getDate()).padStart(2, '0');
                const m = String(date.getMonth() + 1).padStart(2, '0');
                const y = String(date.getFullYear()).slice(-2);
                const dayName = dayNames[date.getDay()];
                return `${dayName}, ${d}:${m}:${y}`;
            };

            const formatTime = (date) => {
                return date.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
            };

            const totals = useMemo(() => {
                const tin = transactions.filter(t => t.type === 'in').reduce((acc, curr) => acc + Number(curr.amount || 0), 0);
                const tout = transactions.filter(t => t.type === 'out').reduce((acc, curr) => acc + Number(curr.amount || 0), 0);
                return { in: tin, out: tout, balance: tin - tout };
            }, [transactions]);

            const handleLogout = () => {
                setIsAdmin(false);
                setView('beranda');
                setShowPassword(false);
            };

            const menuItems = [
                { id: 'beranda', label: 'Beranda', icon: 'home' },
                { id: 'pengurus', label: 'Pengurus', icon: 'users' },
                { id: 'kas', label: 'Kas PHBI', icon: 'wallet' },
                { id: 'galeri', label: 'Galeri', icon: 'image' },
                ...(isAdmin ? [{ id: 'admin', label: 'Panel Admin', icon: 'layout-dashboard' }] : [])
            ];

            return (
                <div className="min-h-screen flex flex-col pt-16 lg:pt-24">
                    {/* Header Navigasi */}
                    <header className="fixed top-0 left-0 w-full z-[100]">
                        <nav className="glass border-b border-slate-200 shadow-sm">
                            <div className="max-w-7xl mx-auto px-4 lg:px-6 py-3 lg:py-4 flex justify-between items-center">
                                <div className="flex items-center gap-3 cursor-pointer" onClick={() => setView('beranda')}>
                                    <div className="w-10 h-10 bg-emerald-800 rounded-xl flex items-center justify-center text-white font-extrabold shadow-lg">MF</div>
                                    <div>
                                        <h1 className="text-base lg:text-lg font-extrabold text-emerald-950 leading-none">Mabda'il Falah</h1>
                                        <p className="text-[8px] font-black text-emerald-600 uppercase tracking-widest mt-1">Pondok Pesantren</p>
                                    </div>
                                </div>

                                <div className="hidden lg:flex items-center gap-8">
                                    <div className="flex gap-6">
                                        {menuItems.map(item => (
                                            <button key={item.id} onClick={() => setView(item.id)} 
                                                className={`text-[10px] font-black uppercase tracking-widest transition-all pb-1 ${view === item.id ? 'nav-link-active' : 'text-slate-400 hover:text-emerald-700'}`}>
                                                {item.label}
                                            </button>
                                        ))}
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <button onClick={() => isAdmin ? setView('admin') : setShowLogin(true)} className={`flex items-center gap-2 px-4 py-2 rounded-xl font-bold text-xs border transition-all ${isAdmin ? 'bg-emerald-800 text-white shadow-lg' : 'bg-emerald-50 text-emerald-700 border-emerald-100 hover:bg-emerald-100'}`}>
                                            <i data-lucide={isAdmin ? "shield-check" : "lock"} className="w-3.5 h-3.5"></i>
                                            {isAdmin ? 'Mode Admin' : 'Login'}
                                        </button>
                                        {isAdmin && (
                                            <button onClick={handleLogout} className="logout-btn flex items-center justify-center w-10 h-10 rounded-xl bg-red-50 text-red-600 border border-red-100 transition-all shadow-sm" title="Keluar">
                                                <i data-lucide="log-out" className="w-4 h-4"></i>
                                            </button>
                                        )}
                                    </div>
                                </div>

                                <div className="flex lg:hidden items-center gap-2">
                                    {isAdmin && <button onClick={handleLogout} className="p-2 text-red-500"><i data-lucide="log-out" className="w-5 h-5"></i></button>}
                                    <button onClick={() => isAdmin ? setView('admin') : setShowLogin(true)} className="p-2 text-emerald-800"><i data-lucide={isAdmin ? "shield-check" : "lock"} className="w-5 h-5"></i></button>
                                    <button onClick={() => setIsMenuOpen(true)} className="p-2 text-emerald-800"><i data-lucide="menu" className="w-6 h-6"></i></button>
                                </div>
                            </div>
                        </nav>
                        
                        {/* Top Bar Informasi */}
                        <div className="w-full bg-emerald-950 py-2 px-4 border-b border-emerald-900/50">
                            <div className="max-w-7xl mx-auto flex items-center justify-between gap-4">
                                <div className="flex items-center gap-2 shrink-0">
                                    <div className="hidden sm:flex items-center gap-1.5 px-2.5 py-1 bg-emerald-900/40 rounded-lg border border-emerald-800/50">
                                        <i data-lucide="calendar" className="w-3 h-3 text-emerald-500"></i>
                                        <span className="text-[9px] font-bold text-emerald-100 uppercase tracking-tighter">
                                            {formatShortDate(currentTime)}
                                        </span>
                                    </div>
                                    <div className="flex items-center gap-1.5 px-2.5 py-1 bg-emerald-900/40 rounded-lg border border-emerald-800/50">
                                        <i data-lucide="clock" className="w-3 h-3 text-emerald-500"></i>
                                        <span className="text-[9px] font-black text-emerald-100 tracking-widest">
                                            {formatTime(currentTime)}
                                        </span>
                                    </div>
                                </div>
                                <div className="flex-1 overflow-hidden relative">
                                    <div key={infoIndex} className="flex items-center justify-center gap-2 animate-in fade-in slide-in-from-right-4 duration-700">
                                        <i data-lucide={infoHighlights[infoIndex].icon} className="w-3 h-3 text-emerald-400"></i>
                                        <span className="text-[9px] sm:text-[10px] font-bold text-emerald-50/90 uppercase tracking-widest leading-none text-center truncate">
                                            {infoHighlights[infoIndex].text}
                                        </span>
                                    </div>
                                </div>
                                <div className="hidden md:block shrink-0 w-[120px]"></div>
                            </div>
                        </div>
                    </header>

                    {/* Mobile Menu */}
                    {isMenuOpen && (
                        <div className="fixed inset-0 z-[200] lg:hidden">
                            <div className="absolute inset-0 bg-emerald-950/40 backdrop-blur-md" onClick={() => setIsMenuOpen(false)}></div>
                            <div className="absolute right-0 top-0 h-full w-[300px] bg-white shadow-2xl p-6 flex flex-col animate-in slide-in-from-right duration-300">
                                <div className="flex justify-between items-center mb-10">
                                    <div className="flex items-center gap-2">
                                        <div className="w-8 h-8 bg-emerald-800 rounded-lg flex items-center justify-center text-white text-xs font-bold">MF</div>
                                        <span className="text-xs font-black uppercase tracking-widest text-emerald-950">Menu Utama</span>
                                    </div>
                                    <button onClick={() => setIsMenuOpen(false)} className="p-2 text-slate-400 hover:text-red-500 transition-colors">
                                        <i data-lucide="x" className="w-6 h-6"></i>
                                    </button>
                                </div>
                                <div className="flex flex-col gap-2">
                                    {menuItems.map(m => (
                                        <button key={m.id} onClick={() => { setView(m.id); setIsMenuOpen(false); }} 
                                            className={`flex items-center gap-4 px-6 py-5 rounded-2xl transition-all ${view === m.id ? 'bg-emerald-800 text-white shadow-lg' : 'text-slate-400 hover:bg-emerald-50 hover:text-emerald-800'}`}>
                                            <i data-lucide={m.icon} className="w-5 h-5"></i>
                                            <span className="text-sm font-bold uppercase tracking-widest">{m.label}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    <main className="flex-1 bg-grid pb-20">
                        {view === 'beranda' && (
                            <section className="hero-gradient text-white pt-16 pb-24 lg:pt-32 lg:pb-48 px-6 text-center relative overflow-hidden">
                                <div className="max-w-4xl mx-auto relative z-10 animate-in fade-in duration-1000">
                                    <h2 className="text-5xl md:text-8xl font-black mb-8 leading-[0.9] tracking-tighter italic">Pesantren<br/>Mabda'il Falah</h2>
                                    <p className="text-base lg:text-xl text-emerald-50/80 max-w-2xl mx-auto mb-12 font-medium leading-relaxed">
                                        Mencetak generasi rabbani yang berpegang teguh pada Al-Qur'an, Hadits, dan khazanah Kitab Kuning melalui pendidikan berbasis adab dan kemandirian.
                                    </p>
                                    <div className="flex flex-col sm:flex-row justify-center gap-4">
                                        <button className="bg-amber-500 text-emerald-950 px-10 py-4 rounded-full font-black text-[11px] uppercase tracking-widest shadow-xl hover:scale-105 transition-all">Pendaftaran PSB</button>
                                        <button onClick={() => setView('galeri')} className="bg-white/10 backdrop-blur-md border border-white/20 px-10 py-4 rounded-full font-black text-[11px] uppercase tracking-widest hover:bg-white/20 transition-all">Lihat Dokumentasi</button>
                                    </div>
                                </div>
                            </section>
                        )}

                        {view === 'pengurus' && (
                            <div className="max-w-7xl mx-auto px-4 lg:px-6 py-12 lg:py-20 animate-in fade-in duration-500">
                                <div className="mb-16">
                                    <h3 className="text-4xl font-black text-emerald-950 tracking-tighter mb-2">Struktur Pengurus</h3>
                                    <p className="text-slate-400 font-medium">Khidmah dan dedikasi untuk membina santri.</p>
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                                    {pengurus.map((p, idx) => (
                                        <div key={p.id || idx} className="profile-card group bg-white rounded-[2rem] p-6 shadow-sm border border-slate-100 flex flex-col items-center text-center">
                                            <div className="w-32 h-32 mb-6 rounded-3xl overflow-hidden ring-4 ring-emerald-50 relative bg-slate-100">
                                                <img 
                                                    src={p.foto || `https://ui-avatars.com/api/?name=${encodeURIComponent(p.nama)}&background=064e3b&color=fff&size=128`} 
                                                    alt={p.nama} 
                                                    className="profile-img w-full h-full object-cover transition-transform duration-700"
                                                />
                                            </div>
                                            <span className="px-3 py-1 bg-emerald-50 text-emerald-700 rounded-full text-[9px] font-black uppercase tracking-widest border border-emerald-100 mb-3">{p.sebagai}</span>
                                            <h4 className="font-bold text-slate-800 text-lg leading-tight mb-2">{p.nama}</h4>
                                            <div className="flex items-center justify-center gap-2 text-slate-400 text-xs font-medium">
                                                <i data-lucide="phone" className="w-3 h-3"></i> {p.kontak || '-'}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'kas' && (
                            <div className="max-w-6xl mx-auto px-4 lg:px-6 py-12 lg:py-20 animate-in slide-in-from-bottom-4">
                                <div className="mb-12">
                                    <h3 className="text-4xl font-black text-emerald-950 tracking-tighter mb-2">Laporan Kas PHBI</h3>
                                    <p className="text-slate-400 font-medium">Data keuangan pembangunan secara transparan dan akuntabel.</p>
                                </div>
                                <div className="grid lg:grid-cols-3 gap-8">
                                    <div className="lg:col-span-2 bg-emerald-900 rounded-[40px] p-10 lg:p-14 text-white shadow-2xl relative overflow-hidden">
                                        <p className="text-[11px] font-black uppercase tracking-[0.2em] text-emerald-400 mb-4">Saldo Tersedia</p>
                                        <h2 className="text-4xl md:text-7xl font-black mb-12 tracking-tighter">{formatRupiah(totals.balance)}</h2>
                                        <div className="grid grid-cols-2 gap-8 pt-10 border-t border-white/10">
                                            <div>
                                                <p className="text-[10px] font-bold text-emerald-400 uppercase mb-2">Pemasukan</p>
                                                <p className="text-xl lg:text-2xl font-black">{formatRupiah(totals.in)}</p>
                                            </div>
                                            <div>
                                                <p className="text-[10px] font-bold text-red-400 uppercase mb-2">Pengeluaran</p>
                                                <p className="text-xl lg:text-2xl font-black">{formatRupiah(totals.out)}</p>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="bg-white border border-slate-200 rounded-[40px] p-10 flex flex-col items-center text-center shadow-xl">
                                        <div className="w-20 h-20 bg-emerald-50 rounded-3xl flex items-center justify-center text-emerald-600 mb-8 shadow-inner">
                                            <i data-lucide="hand-coins" className="w-10 h-10"></i>
                                        </div>
                                        <h4 className="font-black text-slate-800 text-xl mb-4">Donasi Digital</h4>
                                        <p className="text-slate-400 text-sm font-medium leading-relaxed mb-8">Partisipasi anda sangat berharga untuk pengembangan pendidikan Islam.</p>
                                        <button className="w-full py-4 bg-emerald-800 text-white rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-emerald-700 transition-all">Hubungi Bendahara</button>
                                    </div>
                                </div>
                                <div className="mt-16 bg-white rounded-[2rem] border border-slate-100 overflow-hidden shadow-sm">
                                    <div className="p-8 border-b border-slate-50 flex justify-between items-center">
                                        <h4 className="font-black text-emerald-950 uppercase tracking-widest text-sm">Riwayat Transaksi</h4>
                                    </div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left">
                                            <thead className="bg-slate-50 text-[10px] font-black uppercase text-slate-400 tracking-widest">
                                                <tr>
                                                    <th className="px-8 py-5">Tanggal</th>
                                                    <th className="px-8 py-5">Keterangan</th>
                                                    <th className="px-8 py-5 text-right">Nominal</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50">
                                                {transactions.slice(0, 20).map((t, idx) => (
                                                    <tr key={idx} className="hover:bg-slate-50/50">
                                                        <td className="px-8 py-5 text-xs font-bold text-slate-500">{t.date}</td>
                                                        <td className="px-8 py-5 text-sm font-bold text-slate-800">{t.description}</td>
                                                        <td className={`px-8 py-5 text-right font-black text-sm ${t.type === 'in' ? 'text-emerald-600' : 'text-red-500'}`}>
                                                            {t.type === 'in' ? '+' : '-'} {new Intl.NumberFormat('id-ID').format(t.amount)}
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'admin' && isAdmin && (
                            <div className="max-w-7xl mx-auto px-4 lg:px-6 py-12 lg:py-20 animate-in zoom-in-95 duration-300">
                                <div className="flex flex-col md:flex-row md:items-center justify-between mb-12 gap-6">
                                    <div>
                                        <h3 className="text-4xl font-black text-emerald-950 tracking-tighter mb-2 italic underline decoration-amber-400">Admin Control</h3>
                                        <p className="text-slate-400 font-medium">Kelola konten website secara terintegrasi.</p>
                                    </div>
                                    <div className="flex bg-slate-200/50 p-1.5 rounded-2xl">
                                        {['kas', 'galeri', 'pengurus'].map(tab => (
                                            <button 
                                                key={tab}
                                                onClick={() => { setAdminTab(tab); setEditingId(null); setFormData({}); }}
                                                className={`px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${adminTab === tab ? 'admin-tab-active' : 'text-slate-400 hover:text-emerald-800'}`}
                                            >
                                                {tab}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="bg-white rounded-[3rem] p-8 lg:p-12 shadow-sm border border-slate-100 mb-12">
                                    <h4 className="text-xl font-black text-emerald-950 mb-8 uppercase tracking-widest">
                                        {editingId ? 'Edit Data' : `Tambah ${adminTab}`}
                                    </h4>

                                    <form onSubmit={(e) => {
                                        e.preventDefault();
                                        const action = editingId ? 'edit' : 'add';
                                        const sheet = adminTab === 'kas' ? 'Sheet1' : adminTab;
                                        handleCrudAction(action, sheet, formData);
                                    }} className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                                        
                                        {adminTab === 'kas' && (
                                            <>
                                                <div className="space-y-1">
                                                    <label className="text-[10px] font-black text-slate-400 uppercase ml-2">Tanggal</label>
                                                    <input value={formData.date || ''} onChange={e => setFormData({...formData, date: e.target.value})} type="date" className="w-full bg-slate-50 border-none p-4 rounded-2xl font-bold text-xs" required />
                                                </div>
                                                <div className="space-y-1">
                                                    <label className="text-[10px] font-black text-slate-400 uppercase ml-2">Keterangan</label>
                                                    <input value={formData.description || ''} onChange={e => setFormData({...formData, description: e.target.value})} placeholder="Keterangan transaksi" className="w-full bg-slate-50 border-none p-4 rounded-2xl font-bold text-xs" required />
                                                </div>
                                                <div className="space-y-1">
                                                    <label className="text-[10px] font-black text-slate-400 uppercase ml-2">Nominal</label>
                                                    <input value={formData.amount || ''} onChange={e => setFormData({...formData, amount: e.target.value})} type="number" placeholder="Nominal Rp." className="w-full bg-slate-50 border-none p-4 rounded-2xl font-bold text-xs" required />
                                                </div>
                                                <div className="space-y-1">
                                                    <label className="text-[10px] font-black text-slate-400 uppercase ml-2">Jenis Kas</label>
                                                    <select value={formData.type || ''} onChange={e => setFormData({...formData, type: e.target.value})} className="w-full bg-slate-50 border-none p-4 rounded-2xl font-bold text-xs appearance-none" required>
                                                        <option value="">Pilih Kategori</option>
                                                        <option value="in">Pemasukan (+)</option>
                                                        <option value="out">Pengeluaran (-)</option>
                                                    </select>
                                                </div>
                                            </>
                                        )}

                                        {adminTab === 'galeri' && (
                                            <>
                                                <input value={formData.judul || ''} onChange={e => setFormData({...formData, judul: e.target.value})} placeholder="Judul Foto" className="bg-slate-50 border-none p-4 rounded-2xl font-bold text-xs" required />
                                                <input value={formData.imageUrl || ''} onChange={e => setFormData({...formData, imageUrl: e.target.value})} placeholder="URL Gambar" className="bg-slate-50 border-none p-4 rounded-2xl font-bold text-xs" required />
                                                <input value={formData.tanggal || ''} onChange={e => setFormData({...formData, tanggal: e.target.value})} type="date" className="bg-slate-50 border-none p-4 rounded-2xl font-bold text-xs" required />
                                            </>
                                        )}

                                        {adminTab === 'pengurus' && (
                                            <>
                                                <input value={formData.nama || ''} onChange={e => setFormData({...formData, nama: e.target.value})} placeholder="Nama Lengkap" className="bg-slate-50 border-none p-4 rounded-2xl font-bold text-xs" required />
                                                <input value={formData.sebagai || ''} onChange={e => setFormData({...formData, sebagai: e.target.value})} placeholder="Jabatan" className="bg-slate-50 border-none p-4 rounded-2xl font-bold text-xs" required />
                                                <input value={formData.foto || ''} onChange={e => setFormData({...formData, foto: e.target.value})} placeholder="URL Foto" className="bg-slate-50 border-none p-4 rounded-2xl font-bold text-xs" />
                                            </>
                                        )}

                                        <button type="submit" className="md:col-span-full bg-emerald-800 text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-xl mt-4 hover:bg-emerald-700 transition-all">
                                            {isLoading ? 'Sedang Memproses...' : editingId ? 'Simpan Perubahan' : 'Tambah Data Baru'}
                                        </button>
                                        {editingId && (
                                            <button type="button" onClick={() => {setEditingId(null); setFormData({});}} className="md:col-span-full border border-slate-200 text-slate-400 py-3 rounded-2xl font-bold text-[9px] uppercase tracking-widest">Batal Edit</button>
                                        )}
                                    </form>
                                </div>

                                <div className="bg-white rounded-[3rem] overflow-hidden border border-slate-100 shadow-sm">
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left">
                                            <thead className="bg-slate-50 border-b border-slate-100">
                                                <tr>
                                                    <th className="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Informasi Utama</th>
                                                    <th className="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">Aksi</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50">
                                                {(adminTab === 'kas' ? transactions : adminTab === 'galeri' ? gallery : pengurus).map((item, i) => (
                                                    <tr key={item.id || i} className="hover:bg-slate-50/30 transition-colors">
                                                        <td className="px-8 py-6">
                                                            {adminTab === 'kas' ? (
                                                                <div className="flex flex-col gap-1">
                                                                    <div className="flex items-center gap-2">
                                                                        <p className="font-bold text-slate-800 text-sm">{item.description}</p>
                                                                        <span className={`text-[8px] font-black px-2 py-0.5 rounded-md uppercase tracking-tighter ${item.type === 'in' ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-red-700'}`}>
                                                                            {item.type === 'in' ? 'Masuk' : 'Keluar'}
                                                                        </span>
                                                                    </div>
                                                                    <div className="flex items-center gap-3">
                                                                        <span className="text-[10px] text-slate-400 font-black uppercase tracking-tighter">{item.date}</span>
                                                                        <span className={`text-xs font-black ${item.type === 'in' ? 'text-emerald-600' : 'text-red-600'}`}>
                                                                            {item.type === 'in' ? '+' : '-'} {formatRupiah(item.amount)}
                                                                        </span>
                                                                    </div>
                                                                </div>
                                                            ) : (
                                                                <div className="flex flex-col">
                                                                    <p className="font-bold text-slate-800 text-sm">{item.judul || item.nama}</p>
                                                                    <span className="text-[10px] text-slate-400 font-black uppercase tracking-tighter">{item.tanggal || item.sebagai}</span>
                                                                </div>
                                                            )}
                                                        </td>
                                                        <td className="px-8 py-6 text-right">
                                                            <div className="flex justify-end gap-2">
                                                                <button onClick={() => { setEditingId(item.id); setFormData(item); window.scrollTo({top: 200, behavior: 'smooth'}); }} className="w-9 h-9 flex items-center justify-center bg-blue-50 text-blue-600 rounded-xl hover:bg-blue-600 hover:text-white transition-all shadow-sm">
                                                                    <i data-lucide="edit-3" className="w-4 h-4"></i>
                                                                </button>
                                                                <button onClick={() => { if(confirm('Hapus data ini?')) handleCrudAction('delete', adminTab === 'kas' ? 'Sheet1' : adminTab, { id: item.id }); }} className="w-9 h-9 flex items-center justify-center bg-red-50 text-red-600 rounded-xl hover:bg-red-600 hover:text-white transition-all shadow-sm">
                                                                    <i data-lucide="trash-2" className="w-4 h-4"></i>
                                                                </button>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'galeri' && (
                            <div className="max-w-7xl mx-auto px-4 lg:px-6 py-12 lg:py-20 animate-in fade-in duration-500">
                                <div className="mb-12 text-center lg:text-left">
                                    <h3 className="text-4xl font-black text-emerald-950 tracking-tighter mb-2">Galeri & Dokumentasi</h3>
                                    <p className="text-slate-400 font-medium">Dokumentasi kegiatan dan pembangunan pondok.</p>
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                                    {gallery.map((item, idx) => (
                                        <div key={item.id || idx} className="group bg-white rounded-3xl overflow-hidden shadow-sm border border-slate-100 flex flex-col">
                                            <div className="aspect-[4/3] overflow-hidden relative bg-slate-50">
                                                <img 
                                                    src={item.imageUrl} 
                                                    alt={item.judul} 
                                                    className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700"
                                                    onError={(e) => { e.target.src = "https://images.unsplash.com/photo-1590076215667-873d17e78167?w=800"; }}
                                                />
                                            </div>
                                            <div className="p-6">
                                                <span className="text-[9px] font-black text-emerald-600 uppercase tracking-widest mb-2 block">{item.tanggal}</span>
                                                <h4 className="font-bold text-slate-800 text-lg leading-tight line-clamp-2">{item.judul}</h4>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="bg-slate-950 text-white py-12 px-6 border-t border-white/5 mt-auto">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
                            <div className="text-center md:text-left">
                                <div className="flex items-center justify-center md:justify-start gap-3 mb-4">
                                    <div className="w-8 h-8 bg-emerald-800 rounded-lg flex items-center justify-center text-white font-bold">MF</div>
                                    <span className="text-sm font-black uppercase tracking-widest text-emerald-50">Mabda'il Falah</span>
                                </div>
                                <p className="text-slate-500 text-xs max-w-xs leading-relaxed">Pendidikan Islam berbasis adab dan kemandirian untuk masa depan generasi Qur'ani.</p>
                            </div>
                            <p className="text-[10px] font-black text-slate-700 uppercase tracking-[0.4em]">© 2026 Ponpes Mabda'il Falah</p>
                        </div>
                    </footer>

                    {/* Login Modal */}
                    {showLogin && (
                        <div className="fixed inset-0 z-[1000] bg-emerald-950/90 backdrop-blur-xl flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-sm rounded-[40px] p-10 shadow-2xl relative animate-in zoom-in-95 duration-200">
                                <button onClick={() => {setShowLogin(false); setShowPassword(false);}} className="absolute top-8 right-8 text-slate-300 hover:text-slate-500 transition-colors">
                                    <i data-lucide="x" className="w-6 h-6"></i>
                                </button>
                                <div className="text-center mb-10">
                                    <div className="w-16 h-16 bg-emerald-50 rounded-3xl flex items-center justify-center text-emerald-700 mx-auto mb-6 shadow-inner">
                                        <i data-lucide="fingerprint" className="w-8 h-8"></i>
                                    </div>
                                    <h3 className="text-2xl font-black text-slate-800 tracking-tight">Admin Login</h3>
                                    <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-2 italic">Akses Terbatas</p>
                                </div>
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const fd = new FormData(e.target);
                                    if (fd.get('u') === ADMIN_USER && fd.get('p') === ADMIN_PASS) {
                                        setIsAdmin(true); setShowLogin(false); setView('admin');
                                    } else { 
                                        alert("Username atau Password Salah!"); 
                                    }
                                }} className="space-y-4">
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black uppercase text-slate-400 ml-4 tracking-widest">Username</label>
                                        <input 
                                            name="u" 
                                            placeholder="" 
                                            autoComplete="off"
                                            className="w-full px-7 py-5 bg-slate-50 rounded-2xl font-bold text-sm border border-slate-100 outline-none focus:ring-2 focus:ring-emerald-500/20" 
                                            required 
                                        />
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black uppercase text-slate-400 ml-4 tracking-widest">Password</label>
                                        <div className="relative">
                                            <input 
                                                name="p" 
                                                type={showPassword ? "text" : "password"} 
                                                placeholder="••••••••" 
                                                className="w-full px-7 py-5 bg-slate-50 rounded-2xl font-bold text-sm border border-slate-100 outline-none focus:ring-2 focus:ring-emerald-500/20" 
                                                required 
                                            />
                                            <button 
                                                type="button"
                                                onClick={() => setShowPassword(!showPassword)}
                                                className="absolute right-6 top-1/2 -translate-y-1/2 text-slate-400 hover:text-emerald-700 transition-colors"
                                            >
                                                <i data-lucide={showPassword ? "eye-off" : "eye"} className="w-5 h-5"></i>
                                            </button>
                                        </div>
                                    </div>
                                    <button type="submit" className="w-full bg-emerald-800 text-white py-5 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-xl hover:bg-emerald-700 transition-all mt-4">Masuk</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Sinkronisasi */}
                    {isLoading && (
                        <div className="fixed bottom-8 right-8 z-[2000] bg-emerald-950 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-4 animate-in slide-in-from-right-10 duration-300">
                            <div className="w-5 h-5 border-2 border-emerald-400 border-t-transparent rounded-full animate-spin"></div>
                            <span className="text-[10px] font-black uppercase tracking-widest">Sinkronisasi...</span>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
