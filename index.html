<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistem Kas PHBI - MABDA'IL FALAH</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

body { font-family: 'Plus Jakarta Sans', sans-serif; }

/* ✅ FIX MOBILE OVERFLOW */
html, body {
    overflow-x: hidden;
}

/* MARQUEE */
.marquee {
    white-space: nowrap;
    overflow: hidden;
}
.marquee p {
    display: inline-block;
    padding-left: 100%;
    animation: marquee 25s linear infinite;
    font-size: 12px;
}
@media (min-width:768px){
    .marquee p { font-size:14px; }
}
@keyframes marquee {
    0% { transform: translate(0); }
    100% { transform: translate(-100%); }
}

/* GLASS */
.glass-effect {
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(10px);
}

/* HERO */
.hero-gradient {
    background: linear-gradient(rgba(21,128,61,0.8), rgba(6,78,59,0.9)),
    url('https://images.unsplash.com/photo-1590076214667-cda43224346c?auto=format&fit=crop&q=80&w=2000');
    background-size: cover;
    background-position: center;
}
</style>
</head>

<body class="bg-slate-50 text-slate-800">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const GSHEET_URL = "https://script.google.com/macros/s/AKfycbw488C_jSYN96tRoU9nM-tBbCiqOV1xBAd68uaxa2fn4dQ52_ylzWos1-7YvmtFAQEt/exec"; 

const Icon = ({ name, size=20 }) => <i data-lucide={name} style={{width:size,height:size}}></i>;

const App = () => {
const [sidebarOpen,setSidebarOpen]=useState(false);
const [transactions,setTransactions]=useState([]);
const [currentTime,setCurrentTime]=useState(new Date());

useEffect(()=>{
    const t=setInterval(()=>setCurrentTime(new Date()),1000);
    fetchData();
    setTimeout(()=>lucide.createIcons(),500);
    return ()=>clearInterval(t);
},[]);

useEffect(()=>{lucide.createIcons();},[transactions]);

const fetchData = async ()=>{
    try{
        const res = await fetch(GSHEET_URL);
        const data = await res.json();
        setTransactions(data.sort((a,b)=>b.id-a.id));
    }catch(e){console.log(e);}
};

const formatCurrency = (n)=>
new Intl.NumberFormat('id-ID',{style:'currency',currency:'IDR',minimumFractionDigits:0}).format(n||0);

const totalIn = transactions.filter(t=>t.type==='in').reduce((a,b)=>a+Number(b.amount),0);
const totalOut = transactions.filter(t=>t.type==='out').reduce((a,b)=>a+Number(b.amount),0);
const balance = totalIn-totalOut;

return (
<div className="flex min-h-screen bg-slate-50">

{/* SIDEBAR */}
<aside className={`fixed inset-y-0 left-0 z-50 w-72 bg-white border-r transform transition lg:translate-x-0 ${sidebarOpen?'translate-x-0':'-translate-x-full'}`}>
<div className="p-6 text-center font-extrabold text-green-800">MABDA'IL FALAH</div>
</aside>

{/* OVERLAY MOBILE */}
{sidebarOpen && (
<div className="fixed inset-0 bg-black/40 z-40 lg:hidden"
onClick={()=>setSidebarOpen(false)}></div>
)}

{/* MAIN */}
<main className="flex-1 lg:ml-72 flex flex-col min-h-screen w-full max-w-full overflow-x-hidden">

{/* TOP BAR */}
<div className="bg-green-900 text-white py-2 px-3 sm:px-6 flex flex-wrap items-center justify-between gap-2 sm:gap-4 sticky top-0 z-40">
<div>{currentTime.toLocaleTimeString()}</div>
<div className="marquee flex-1">
<p>🌟 Laporan kas update • 🕌 Donasi • 📅 {currentTime.toLocaleDateString()}</p>
</div>
</div>

{/* MOBILE HEADER */}
<header className="lg:hidden p-4 flex justify-between bg-white border-b">
<h2 className="font-bold text-green-800">MABDA'IL FALAH</h2>
<button onClick={()=>setSidebarOpen(true)} className="bg-green-700 text-white px-3 py-1 rounded">Menu</button>
</header>

<div className="p-3 sm:p-4 md:p-8 flex-1">

{/* HERO */}
<div className="relative h-40 md:h-64 rounded-3xl mb-6 overflow-hidden hero-gradient flex flex-col justify-end p-4 md:p-8">
<h1 className="text-white text-xl sm:text-2xl md:text-5xl font-black">Kas Digital PHBI</h1>
<p className="text-white/80 text-sm md:text-lg">Transparansi keuangan</p>
</div>

{/* DASHBOARD */}
<div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
<div className="bg-white p-5 rounded-2xl shadow">
Saldo<br/><b>{formatCurrency(balance)}</b>
</div>
<div className="bg-white p-5 rounded-2xl shadow">
Masuk<br/><b>{formatCurrency(totalIn)}</b>
</div>
<div className="bg-white p-5 rounded-2xl shadow">
Keluar<br/><b>{formatCurrency(totalOut)}</b>
</div>
</div>

{/* TABLE */}
<div className="bg-white rounded-2xl shadow overflow-x-auto w-full">
<table className="w-full min-w-[600px] text-sm">
<thead className="bg-slate-100">
<tr>
<th className="p-3">Tanggal</th>
<th>Keterangan</th>
<th>Nominal</th>
</tr>
</thead>
<tbody>
{transactions.map((t,i)=>(
<tr key={i} className="border-b">
<td className="p-3">{t.date}</td>
<td>{t.description}</td>
<td className={t.type==='in'?'text-green-600':'text-red-600'}>
{formatCurrency(t.amount)}
</td>
</tr>
))}
</tbody>
</table>
</div>

</div>

{/* FOOTER */}
<footer className="bg-white border-t p-6 text-center text-sm text-slate-500">
© {new Date().getFullYear()} MABDA'IL FALAH
</footer>

</main>
</div>
);
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
