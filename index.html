<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kas & Pengurus PHBI MABDA'IL FALAH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .marquee-container {
            width: 100%;
            overflow: hidden;
            background: #15803d;
            color: white;
            padding: 12px 0;
            display: flex;
        }

        .marquee-content {
            display: inline-block;
            white-space: nowrap;
            animation: marquee 30s linear infinite;
            font-weight: 800;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .glass-header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        [data-lucide] {
            stroke-width: 2.5px;
            display: inline-block;
            vertical-align: middle;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }

        .active-nav {
            background: #15803d !important;
            color: white !important;
            box-shadow: 0 10px 15px -3px rgba(21, 128, 61, 0.2);
        }

        .active-admin {
            background: #1e293b !important;
            color: white !important;
        }
    </style>
</head>
<body class="bg-[#FBFCFE] text-slate-900 text-left">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;
        
        const GSHEET_URL = "https://script.google.com/macros/s/AKfycbyjQjA3aja6XbLWKChoJ4FrO0O8Tt3t9zbdk7Qx1tNfrP9J66UJaKWVmzEB90OQR-Hg/exec"; 
        const ADMIN_USER = "mabdail_admin";
        const ADMIN_PASS = "Mabda2026!PHBI";
        
        const CONTACT_INFO = {
            whatsapp: "6281234567890",
            email: "phbi@mabdailfalah.com",
            address: "Kp. Tanjakan RT/RW 09/02, Desa Tanjakan, Kec. Rajeg, Tangerang, Banten 15540"
        };

        const App = () => {
            const [isAdmin, setIsAdmin] = useState(false);
            const [showLoginModal, setShowLoginModal] = useState(false);
            const [showEditModal, setShowEditModal] = useState(false);
            const [showPassword, setShowPassword] = useState(false);
            const [loginData, setLoginData] = useState({ username: '', password: '' });
            const [editItem, setEditItem] = useState(null);
            const [view, setView] = useState('dashboard');
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [loading, setLoading] = useState(false);
            
            const [transactions, setTransactions] = useState([]);
            const [galleryItems, setGalleryItems] = useState([]);
            const [pengurusList, setPengurusList] = useState([]);
            const [currentTime, setCurrentTime] = useState(new Date());

            const refreshIcons = useCallback(() => {
                if (window.lucide) window.lucide.createIcons();
            }, []);

            useEffect(() => {
                refreshIcons();
            }, [view, isAdmin, showLoginModal, showEditModal, sidebarOpen, transactions, pengurusList, galleryItems, refreshIcons]);

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                fetchAllData();
                return () => clearInterval(timer);
            }, []);

            const fetchAllData = async () => {
                setLoading(true);
                try {
                    const [resTrans, resGal, resPeng] = await Promise.all([
                        fetch(`${GSHEET_URL}?sheet=Sheet1`),
                        fetch(`${GSHEET_URL}?sheet=galeri`),
                        fetch(`${GSHEET_URL}?sheet=pengurus`)
                    ]);
                    
                    const dataTrans = await resTrans.json();
                    const dataGal = await resGal.json();
                    const dataPeng = await resPeng.json();

                    setTransactions(Array.isArray(dataTrans) ? dataTrans.sort((a, b) => b.id - a.id) : []);
                    setGalleryItems(Array.isArray(dataGal) ? dataGal.sort((a, b) => b.id - a.id) : []);
                    setPengurusList(Array.isArray(dataPeng) ? dataPeng : []);
                } catch (error) {
                    console.error("Fetch error:", error);
                } finally {
                    setLoading(false);
                }
            };

            const handleSubmitAction = async (e) => {
                e.preventDefault();
                setLoading(true);
                const formData = new FormData(e.target);
                const isEdit = formData.get('action_type') === 'update';
                let payload = { action: isEdit ? 'update' : 'insert', data: {} };

                try {
                    if (view.includes('kas') || editItem?._type === 'kas') {
                        payload.sheet = 'Sheet1';
                        payload.data = {
                            id: isEdit ? formData.get('id') : Date.now().toString(),
                            date: isEdit ? formData.get('date') : new Date().toLocaleDateString('id-ID'),
                            description: formData.get('description'),
                            category: formData.get('category'),
                            amount: Number(formData.get('amount')),
                            type: formData.get('type')
                        };
                    } else if (view.includes('pengurus') || editItem?._type === 'pengurus') {
                        payload.sheet = 'pengurus';
                        payload.data = {
                            id: isEdit ? formData.get('id') : Date.now().toString(),
                            nama: formData.get('nama'),
                            sebagai: formData.get('sebagai'),
                            kontak: formData.get('kontak')
                        };
                    } else if (view.includes('galeri') || editItem?._type === 'galeri') {
                        payload.sheet = 'galeri';
                        payload.data = {
                            id: isEdit ? formData.get('id') : Date.now().toString(),
                            judul: formData.get('judul'),
                            imageUrl: formData.get('imageUrl'),
                            tanggal: formData.get('tanggal') || new Date().toLocaleDateString('id-ID')
                        };
                    }

                    if (isEdit) payload.id = payload.data.id;

                    const response = await fetch(GSHEET_URL, {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });

                    if (response.ok) {
                        e.target.reset();
                        setShowEditModal(false);
                        setEditItem(null);
                        fetchAllData();
                        setView(view.replace('add-', ''));
                    }
                } catch (error) {
                    alert("Gagal memproses data.");
                } finally {
                    setLoading(false);
                }
            };

            const handleDelete = async (id, sheet) => {
                if (!confirm(`Hapus data ini secara permanen dari tabel ${sheet}?`)) return;
                setLoading(true);
                try {
                    const response = await fetch(GSHEET_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: "delete", id: id, sheet: sheet })
                    });
                    if (response.ok) {
                        fetchAllData();
                    }
                } catch (error) {
                    alert("Gagal menghapus data.");
                } finally {
                    setLoading(false);
                }
            };

            const openEdit = (item, type) => {
                setEditItem({...item, _type: type});
                setShowEditModal(true);
            };

            const handleLogin = (e) => {
                e.preventDefault();
                if (loginData.username === ADMIN_USER && loginData.password === ADMIN_PASS) {
                    setIsAdmin(true);
                    setShowLoginModal(false);
                    setLoginData({ username: '', password: '' });
                } else {
                    alert("Username atau Password salah!");
                }
            };

            const totals = useMemo(() => {
                const tin = transactions.filter(t => t.type === 'in').reduce((acc, curr) => acc + Number(curr.amount), 0);
                const tout = transactions.filter(t => t.type === 'out').reduce((acc, curr) => acc + Number(curr.amount), 0);
                return { in: tin, out: tout, balance: tin - tout };
            }, [transactions]);

            const formatCurrency = (amount) => {
                return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(amount || 0);
            };

            const formatDateFull = (date) => {
                return new Intl.DateTimeFormat('id-ID', { 
                    weekday: 'long', 
                    day: 'numeric', 
                    month: 'long', 
                    year: 'numeric' 
                }).format(date);
            };

            return (
                <div className="flex flex-col min-h-screen">
                    {/* Header */}
                    <header className="sticky top-0 z-50 glass-header border-b border-slate-200 px-4 md:px-8 py-3 flex items-center justify-between">
                        <div className="flex items-center gap-4">
                            <button onClick={() => setSidebarOpen(true)} className="lg:hidden p-2 text-green-700 bg-green-50 rounded-xl">
                                <i data-lucide="menu"></i>
                            </button>
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 md:w-12 md:h-12 bg-green-700 rounded-full flex items-center justify-center text-white shadow-lg font-black">MF</div>
                                <div className="text-left">
                                    <h1 className="text-base md:text-xl font-extrabold text-green-800 leading-none">MABDA'IL FALAH</h1>
                                    <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-1">Sistem PHBI & Kas</p>
                                </div>
                            </div>
                        </div>
                        <div className="text-right hidden sm:block">
                            <div className="text-lg font-mono font-black text-slate-800">{currentTime.toLocaleTimeString('id-ID')}</div>
                            <div className="text-[10px] font-bold text-slate-500">{formatDateFull(currentTime)}</div>
                        </div>
                    </header>

                    {/* Marquee */}
                    <div className="marquee-container no-print">
                        <div className="marquee-content">
                            <span className="mx-8">Saldo Kas Saat Ini: {formatCurrency(totals.balance)}</span>
                            <span className="mx-8">•</span>
                            <span className="mx-8">Update Transaksi Terakhir: {transactions[0]?.date || '-'}</span>
                            <span className="mx-8">•</span>
                            <span className="mx-8">Terima kasih atas Infaq & Shadaqah anda</span>
                        </div>
                    </div>

                    <div className="flex flex-1 overflow-hidden">
                        {/* Sidebar */}
                        <aside className={`fixed inset-y-0 left-0 z-[60] w-64 bg-white border-r transition-transform duration-300 lg:translate-x-0 lg:static ${sidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                            <div className="p-4 space-y-1 h-full flex flex-col">
                                <div className="mb-4">
                                    <p className="px-4 text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Menu Utama</p>
                                    {[
                                        { id: 'dashboard', icon: 'layout-grid', label: 'Dashboard' },
                                        { id: 'history', icon: 'file-text', label: 'Laporan Kas' },
                                        { id: 'galeri', icon: 'image', label: 'Dokumentasi' },
                                        { id: 'struktur', icon: 'users', label: 'Pengurus' }
                                    ].map(item => (
                                        <button key={item.id} onClick={() => {setView(item.id); setSidebarOpen(false)}} className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl font-bold text-sm transition-all mb-1 ${view === item.id ? 'active-nav' : 'text-slate-500 hover:bg-slate-50'}`}>
                                            <i data-lucide={item.icon} className="w-5 h-5"></i> {item.label}
                                        </button>
                                    ))}
                                </div>

                                {isAdmin && (
                                    <div className="pt-4 border-t border-slate-100">
                                        <p className="px-4 text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Admin Tools</p>
                                        <button onClick={() => {setView('add-kas'); setSidebarOpen(false)}} className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl font-bold text-sm mb-1 ${view === 'add-kas' ? 'active-admin' : 'text-blue-600 bg-blue-50'}`}>
                                            <i data-lucide="plus-circle" className="w-5 h-5"></i> Kas Baru
                                        </button>
                                        <button onClick={() => {setView('add-galeri'); setSidebarOpen(false)}} className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl font-bold text-sm mb-1 ${view === 'add-galeri' ? 'active-admin' : 'text-purple-600 bg-purple-50'}`}>
                                            <i data-lucide="image-plus" className="w-5 h-5"></i> Dokumentasi Baru
                                        </button>
                                        <button onClick={() => {setView('add-pengurus'); setSidebarOpen(false)}} className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl font-bold text-sm mb-1 ${view === 'add-pengurus' ? 'active-admin' : 'text-orange-600 bg-orange-50'}`}>
                                            <i data-lucide="user-plus" className="w-5 h-5"></i> Pengurus Baru
                                        </button>
                                    </div>
                                )}

                                <div className="mt-auto">
                                    {!isAdmin ? (
                                        <button onClick={() => setShowLoginModal(true)} className="w-full py-4 bg-slate-900 text-white rounded-2xl font-black text-[10px] tracking-widest flex items-center justify-center gap-2">
                                            <i data-lucide="lock" className="w-4 h-4"></i> LOGIN ADMIN
                                        </button>
                                    ) : (
                                        <button onClick={() => setIsAdmin(false)} className="w-full py-4 bg-red-50 text-red-600 rounded-2xl font-black text-[10px] tracking-widest flex items-center justify-center gap-2">
                                            <i data-lucide="log-out" className="w-4 h-4"></i> LOGOUT
                                        </button>
                                    )}
                                </div>
                            </div>
                        </aside>

                        {/* Main Content Area */}
                        <div className="flex-1 flex flex-col overflow-hidden">
                            <main className="flex-1 overflow-y-auto bg-[#F8FAFC] p-4 md:p-8 custom-scrollbar">
                                {loading && (
                                    <div className="flex flex-col items-center justify-center py-20 animate-pulse">
                                        <div className="w-12 h-12 border-4 border-green-700 border-t-transparent rounded-full animate-spin mb-4"></div>
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em]">Memproses GSheet...</p>
                                    </div>
                                )}

                                {!loading && view === 'dashboard' && (
                                    <div className="max-w-5xl mx-auto space-y-8 animate-in fade-in duration-500">
                                        <div className="bg-gradient-to-br from-green-800 to-green-600 p-8 md:p-12 rounded-[48px] text-white shadow-2xl relative overflow-hidden text-left">
                                            <h2 className="text-3xl md:text-5xl font-black mb-8 relative z-10">Ringkasan Kas PHBI</h2>
                                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 relative z-10">
                                                <div className="bg-white/10 backdrop-blur-md p-6 rounded-3xl border border-white/10">
                                                    <p className="text-[10px] font-black uppercase opacity-60">Total Pemasukan</p>
                                                    <h3 className="text-xl font-black mt-1">{formatCurrency(totals.in)}</h3>
                                                </div>
                                                <div className="bg-white/10 backdrop-blur-md p-6 rounded-3xl border border-white/10">
                                                    <p className="text-[10px] font-black uppercase opacity-60">Total Pengeluaran</p>
                                                    <h3 className="text-xl font-black mt-1">{formatCurrency(totals.out)}</h3>
                                                </div>
                                                <div className="bg-white p-6 rounded-3xl text-green-900 shadow-xl">
                                                    <p className="text-[10px] font-black uppercase opacity-60">Sisa Saldo Kas</p>
                                                    <h3 className="text-xl font-black mt-1">{formatCurrency(totals.balance)}</h3>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                                            <div className="bg-white p-6 rounded-[32px] border border-slate-100 flex flex-col justify-center items-center">
                                                <div className="w-12 h-12 bg-green-50 rounded-full flex items-center justify-center text-green-700 mb-2"><i data-lucide="arrow-down-left"></i></div>
                                                <p className="text-[10px] font-black text-slate-400 uppercase">Transaksi</p>
                                                <h4 className="font-black text-lg text-slate-800">{transactions.length} Data</h4>
                                            </div>
                                            <div className="bg-white p-6 rounded-[32px] border border-slate-100 flex flex-col justify-center items-center">
                                                <div className="w-12 h-12 bg-blue-50 rounded-full flex items-center justify-center text-blue-700 mb-2"><i data-lucide="users"></i></div>
                                                <p className="text-[10px] font-black text-slate-400 uppercase">Pengurus</p>
                                                <h4 className="font-black text-lg text-slate-800">{pengurusList.length} Orang</h4>
                                            </div>
                                            <div className="bg-white p-6 rounded-[32px] border border-slate-100 flex flex-col justify-center items-center">
                                                <div className="w-12 h-12 bg-purple-50 rounded-full flex items-center justify-center text-purple-700 mb-2"><i data-lucide="camera"></i></div>
                                                <p className="text-[10px] font-black text-slate-400 uppercase">Dokumentasi</p>
                                                <h4 className="font-black text-lg text-slate-800">{galleryItems.length} Foto</h4>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {!loading && view === 'history' && (
                                    <div className="max-w-6xl mx-auto space-y-6 animate-in slide-in-from-bottom-4 duration-500 text-left">
                                        <div className="flex justify-between items-center">
                                            <h2 className="text-2xl font-black text-slate-800">Laporan Keuangan PHBI</h2>
                                            {isAdmin && <button onClick={() => setView('add-kas')} className="bg-slate-900 text-white px-5 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest">+ Transaksi</button>}
                                        </div>
                                        <div className="bg-white rounded-[40px] overflow-hidden border border-slate-100 shadow-sm overflow-x-auto">
                                            <table className="w-full text-left min-w-[700px]">
                                                <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase">
                                                    <tr>
                                                        <th className="p-6">ID</th>
                                                        <th className="p-6">Tanggal</th>
                                                        <th className="p-6">Kategori</th>
                                                        <th className="p-6">Keterangan</th>
                                                        <th className="p-6 text-right">Debit</th>
                                                        <th className="p-6 text-right">Kredit</th>
                                                        {isAdmin && <th className="p-6 text-center">Aksi</th>}
                                                    </tr>
                                                </thead>
                                                <tbody className="text-sm divide-y divide-slate-50">
                                                    {transactions.map((t, i) => (
                                                        <tr key={t.id || i} className="hover:bg-slate-50/50 transition-colors">
                                                            <td className="p-6 text-[10px] font-mono text-slate-300">#{String(t.id).slice(-6)}</td>
                                                            <td className="p-6 font-bold text-slate-500">{t.date}</td>
                                                            <td className="p-6">
                                                                <span className={`px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest ${t.type === 'in' ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700'}`}>
                                                                    {t.category || (t.type === 'in' ? 'Masuk' : 'Keluar')}
                                                                </span>
                                                            </td>
                                                            <td className="p-6 font-bold text-slate-800">{t.description}</td>
                                                            <td className="p-6 text-right font-black text-green-600">{t.type === 'in' ? formatCurrency(t.amount) : '-'}</td>
                                                            <td className="p-6 text-right font-black text-red-500">{t.type === 'out' ? formatCurrency(t.amount) : '-'}</td>
                                                            {isAdmin && (
                                                                <td className="p-6 text-center whitespace-nowrap">
                                                                    <button onClick={() => openEdit(t, 'kas')} className="text-blue-400 hover:text-blue-600 p-2"><i data-lucide="edit-3" className="w-4 h-4"></i></button>
                                                                    <button onClick={() => handleDelete(t.id, 'Sheet1')} className="text-red-400 hover:text-red-600 p-2"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                                                </td>
                                                            )}
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                )}

                                {!loading && view === 'struktur' && (
                                    <div className="max-w-6xl mx-auto space-y-8 animate-in slide-in-from-bottom-4 duration-500 text-left">
                                        <div className="flex justify-between items-center">
                                            <h2 className="text-2xl font-black text-slate-800">Struktur Pengurus</h2>
                                            {isAdmin && <button onClick={() => setView('add-pengurus')} className="bg-slate-900 text-white px-5 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest">+ Pengurus</button>}
                                        </div>
                                        <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
                                            {pengurusList.map((p, i) => (
                                                <div key={p.id || i} className="bg-white p-6 rounded-[32px] border border-slate-100 flex flex-col items-center group relative shadow-sm hover:shadow-xl transition-all">
                                                    {isAdmin && (
                                                        <div className="absolute top-4 right-4 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                                            <button onClick={() => openEdit(p, 'pengurus')} className="bg-blue-50 text-blue-500 p-2 rounded-lg hover:bg-blue-100"><i data-lucide="edit-3" className="w-3 h-3"></i></button>
                                                            <button onClick={() => handleDelete(p.id, 'pengurus')} className="bg-red-50 text-red-500 p-2 rounded-lg hover:bg-red-100"><i data-lucide="trash-2" className="w-3 h-3"></i></button>
                                                        </div>
                                                    )}
                                                    <div className="w-16 h-16 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-400 mb-4">
                                                        <i data-lucide="user" className="w-8 h-8"></i>
                                                    </div>
                                                    <h4 className="font-black text-slate-800 text-[13px] text-center leading-tight">{p.nama}</h4>
                                                    <p className="text-[9px] font-black text-green-600 uppercase tracking-widest mt-2 px-3 py-1 bg-green-50 rounded-full">{p.sebagai || p.jabatan}</p>
                                                    <p className="text-[9px] text-slate-400 font-bold mt-2">{p.kontak || '-'}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {!loading && view === 'galeri' && (
                                    <div className="max-w-6xl mx-auto space-y-8 animate-in slide-in-from-bottom-4 duration-500 text-left">
                                        <div className="flex justify-between items-center">
                                            <h2 className="text-2xl font-black text-slate-800">Dokumentasi PHBI</h2>
                                            {isAdmin && <button onClick={() => setView('add-galeri')} className="bg-slate-900 text-white px-5 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest">+ Foto</button>}
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                            {galleryItems.map((item, i) => (
                                                <div key={item.id || i} className="bg-white rounded-[32px] overflow-hidden border border-slate-100 shadow-sm group relative hover:shadow-xl transition-all">
                                                    {isAdmin && (
                                                        <div className="absolute top-4 right-4 z-10 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                                            <button onClick={() => openEdit(item, 'galeri')} className="bg-white/90 backdrop-blur shadow-lg text-blue-600 p-2 rounded-xl hover:bg-blue-600 hover:text-white"><i data-lucide="edit-3" className="w-4 h-4"></i></button>
                                                            <button onClick={() => handleDelete(item.id, 'galeri')} className="bg-white/90 backdrop-blur shadow-lg text-red-600 p-2 rounded-xl hover:bg-red-600 hover:text-white"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                                        </div>
                                                    )}
                                                    <img src={item.imageUrl} className="w-full aspect-video object-cover" loading="lazy" onError={(e) => e.target.src="https://via.placeholder.com/800x450?text=Gambar+Tidak+Ditemukan"} />
                                                    <div className="p-6">
                                                        <p className="text-[10px] font-black text-green-600 uppercase mb-1">{item.tanggal}</p>
                                                        <h3 className="font-bold text-slate-800">{item.judul}</h3>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </main>

                            {/* Footer Section */}
                            <footer className="bg-white border-t border-slate-100 p-8 no-print">
                                <div className="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8 text-left">
                                    <div className="space-y-4">
                                        <div className="flex items-center gap-3">
                                            <div className="w-10 h-10 bg-green-700 rounded-full flex items-center justify-center text-white font-black">MF</div>
                                            <h4 className="font-black text-green-800 text-lg uppercase">MABDA'IL FALAH</h4>
                                        </div>
                                        <p className="text-xs font-bold text-slate-400 leading-relaxed uppercase tracking-widest">
                                            {CONTACT_INFO.address}
                                        </p>
                                    </div>
                                    <div className="space-y-4">
                                        <p className="text-[10px] font-black text-slate-300 uppercase tracking-[0.2em]">Hubungi Kami</p>
                                        <div className="space-y-3">
                                            <a href={`https://wa.me/${CONTACT_INFO.whatsapp}`} className="flex items-center gap-3 text-slate-600 hover:text-green-600 transition-colors">
                                                <i data-lucide="phone" className="w-4 h-4"></i>
                                                <span className="text-sm font-bold">+{CONTACT_INFO.whatsapp}</span>
                                            </a>
                                            <div className="flex items-center gap-3 text-slate-600">
                                                <i data-lucide="mail" className="w-4 h-4"></i>
                                                <span className="text-sm font-bold">{CONTACT_INFO.email}</span>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="space-y-4 md:text-right">
                                        <p className="text-[10px] font-black text-slate-300 uppercase tracking-[0.2em]">Informasi</p>
                                        <p className="text-xs font-bold text-slate-400 leading-relaxed">
                                            Aplikasi Pengelolaan Kas & Dokumentasi Kegiatan PHBI Musholla Mabda'il Falah. Terintegrasi Cloud Database.
                                        </p>
                                        <p className="text-[9px] font-black text-slate-200 uppercase mt-4">© 2026 Musholla Mabda'il Falah</p>
                                    </div>
                                </div>
                            </footer>
                        </div>
                    </div>

                    {/* CRUD FORM MODAL (CREATE/UPDATE) */}
                    {!loading && (isAdmin && (view.startsWith('add-') || showEditModal)) && (
                        <div className="fixed inset-0 z-[100] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-xl rounded-[40px] p-8 md:p-10 shadow-2xl relative animate-in zoom-in duration-300 max-h-[90vh] overflow-y-auto custom-scrollbar">
                                <button onClick={() => {setShowEditModal(false); setView('dashboard'); setEditItem(null)}} className="absolute top-8 right-8 text-slate-300 hover:text-slate-900"><i data-lucide="x"></i></button>
                                
                                <div className="flex items-center gap-4 mb-8 text-left">
                                    <div className="w-12 h-12 bg-slate-900 text-white rounded-2xl flex items-center justify-center">
                                        <i data-lucide={
                                            view.includes('kas') || editItem?._type === 'kas' ? 'file-text' : 
                                            view.includes('galeri') || editItem?._type === 'galeri' ? 'image' : 'users'
                                        }></i>
                                    </div>
                                    <div>
                                        <h3 className="text-2xl font-black text-slate-800">{editItem ? 'Edit Data' : 'Tambah Baru'}</h3>
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Sinkronisasi Cloud Google</p>
                                    </div>
                                </div>

                                <form onSubmit={handleSubmitAction} className="space-y-6 text-left">
                                    <input type="hidden" name="action_type" value={editItem ? 'update' : 'insert'} />
                                    {editItem && <input type="hidden" name="id" value={editItem.id} />}
                                    
                                    {/* FORM KAS */}
                                    {(view.includes('kas') || editItem?._type === 'kas') && (
                                        <div className="space-y-4">
                                            <input type="hidden" name="date" value={editItem?.date || new Date().toLocaleDateString('id-ID')} />
                                            <div className="space-y-1">
                                                <label className="text-[10px] font-black text-slate-400 uppercase ml-4">Kategori</label>
                                                <select name="category" defaultValue={editItem?.category || ""} className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-green-200" required>
                                                    <option value="">Pilih Kategori...</option>
                                                    <option value="Infaq">Infaq</option>
                                                    <option value="Shadaqah">Shadaqah</option>
                                                    <option value="Donasi PHBI">Donasi PHBI</option>
                                                    <option value="Sewa Alat">Sewa Alat</option>
                                                    <option value="Pengeluaran">Pengeluaran Operasional</option>
                                                </select>
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-[10px] font-black text-slate-400 uppercase ml-4">Keterangan</label>
                                                <input name="description" defaultValue={editItem?.description} type="text" placeholder="Detail transaksi..." className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-green-200" required />
                                            </div>
                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="space-y-1">
                                                    <label className="text-[10px] font-black text-slate-400 uppercase ml-4">Jumlah (Rp)</label>
                                                    <input name="amount" defaultValue={editItem?.amount} type="number" className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-green-200" required />
                                                </div>
                                                <div className="space-y-1">
                                                    <label className="text-[10px] font-black text-slate-400 uppercase ml-4">Tipe</label>
                                                    <select name="type" defaultValue={editItem?.type || "in"} className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-green-200" required>
                                                        <option value="in">MASUK (DEBIT)</option>
                                                        <option value="out">KELUAR (KREDIT)</option>
                                                    </select>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* FORM PENGURUS */}
                                    {(view.includes('pengurus') || editItem?._type === 'pengurus') && (
                                        <div className="space-y-4">
                                            <div className="space-y-1">
                                                <label className="text-[10px] font-black text-slate-400 uppercase ml-4">Nama Pengurus</label>
                                                <input name="nama" defaultValue={editItem?.nama} type="text" className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-green-200" required />
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-[10px] font-black text-slate-400 uppercase ml-4">Sebagai / Jabatan</label>
                                                <input name="sebagai" defaultValue={editItem?.sebagai || editItem?.jabatan} type="text" placeholder="Contoh: Ketua, Bendahara, Seksi Acara" className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-green-200" required />
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-[10px] font-black text-slate-400 uppercase ml-4">Kontak (WhatsApp)</label>
                                                <input name="kontak" defaultValue={editItem?.kontak} type="text" placeholder="62812xxx" className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-green-200" />
                                            </div>
                                        </div>
                                    )}

                                    {/* FORM GALERI / DOKUMENTASI */}
                                    {(view.includes('galeri') || editItem?._type === 'galeri') && (
                                        <div className="space-y-4">
                                            <div className="space-y-1">
                                                <label className="text-[10px] font-black text-slate-400 uppercase ml-4">Judul Kegiatan</label>
                                                <input name="judul" defaultValue={editItem?.judul} type="text" placeholder="Contoh: Peringatan Isra Mi'raj 1447H" className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-green-200" required />
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-[10px] font-black text-slate-400 uppercase ml-4">URL Link Foto</label>
                                                <input name="imageUrl" defaultValue={editItem?.imageUrl} type="url" placeholder="https://link-gambar.com/foto.jpg" className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-green-200" required />
                                                <p className="text-[9px] text-slate-400 px-4">Gunakan link langsung ke file gambar (JPG/PNG).</p>
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-[10px] font-black text-slate-400 uppercase ml-4">Tanggal Kegiatan</label>
                                                <input name="tanggal" defaultValue={editItem?.tanggal || new Date().toLocaleDateString('id-ID')} type="text" placeholder="12 Maret 2026" className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-green-200" required />
                                            </div>
                                        </div>
                                    )}

                                    <div className="flex gap-4 pt-4">
                                        <button type="button" onClick={() => {setShowEditModal(false); setView('dashboard'); setEditItem(null)}} className="flex-1 py-4 border-2 border-slate-100 rounded-2xl font-black text-[10px] tracking-widest uppercase text-slate-400">Batal</button>
                                        <button type="submit" className="flex-1 py-4 bg-slate-900 text-white rounded-2xl font-black text-[10px] tracking-widest uppercase">Simpan Perubahan</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Login Modal */}
                    {showLoginModal && (
                        <div className="fixed inset-0 z-[100] bg-slate-900/40 backdrop-blur-xl flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-sm rounded-[40px] p-10 shadow-2xl relative animate-in zoom-in duration-300">
                                <button onClick={() => setShowLoginModal(false)} className="absolute top-8 right-8 text-slate-300 hover:text-slate-900"><i data-lucide="x"></i></button>
                                <div className="text-center mb-8">
                                    <h3 className="text-2xl font-black text-slate-800">Admin Login</h3>
                                    <p className="text-[10px] font-black text-slate-400 uppercase mt-1 tracking-widest">Sistem Kas Mabda'il Falah</p>
                                </div>
                                <form onSubmit={handleLogin} className="space-y-4 text-left">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-slate-400 uppercase ml-4">Username</label>
                                        <input type="text" className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-green-200" value={loginData.username} onChange={e => setLoginData({...loginData, username: e.target.value})} required />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-slate-400 uppercase ml-4">Password</label>
                                        <div className="relative">
                                            <input type={showPassword ? "text" : "password"} className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-green-200" value={loginData.password} onChange={e => setLoginData({...loginData, password: e.target.value})} required />
                                            <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-300">
                                                <i data-lucide={showPassword ? "eye-off" : "eye"} className="w-5 h-5"></i>
                                            </button>
                                        </div>
                                    </div>
                                    <button type="submit" className="w-full py-4 bg-slate-900 text-white rounded-2xl font-black uppercase text-[11px] tracking-widest mt-4 shadow-xl hover:shadow-slate-200 transition-all">Verifikasi Akun</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
