<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="ubH5sTypjnfkqZuLIJIIhGC0g_WOG2X84iESlRDmrEs" />
    <title>Kas & Pengurus PHBI MABDA'IL FALAH</title>
    <meta name="description" content="Website resmi laporan kas dan pengurus PHBI Mabda'il Falah Tangerang. Transparansi keuangan, dokumentasi kegiatan, dan informasi pengurus.">
    <meta name="keywords" content="kas masjid, PHBI, Mabdail Falah, laporan keuangan pesantren, Tangerang">
    <meta name="author" content="PHBI Mabda'il Falah">

    <meta property="og:title" content="Kas PHBI Mabda'il Falah">
    <meta property="og:description" content="Laporan kas dan kegiatan PHBI Mabda'il Falah">
    <meta property="og:type" content="website">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .marquee-container {
            width: 100%;
            overflow: hidden;
            background: #15803d;
            color: white;
            padding: 8px 0;
            display: flex;
        }

        .marquee-content {
            display: inline-block;
            white-space: nowrap;
            animation: marquee 30s linear infinite;
            font-weight: 800;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .glass-header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .active-nav {
            background: #15803d !important;
            color: white !important;
            box-shadow: 0 10px 15px -3px rgba(21, 128, 61, 0.2);
        }

        .active-admin {
            background: #1e293b !important;
            color: white !important;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-[#FBFCFE] text-slate-900 text-left">
    <div id="root"></div>
    <noscript>
  <h1>Kas PHBI Mabda'il Falah</h1>
  <p>Website ini berisi laporan kas, pengurus, dan dokumentasi kegiatan PHBI Mabda'il Falah di Tangerang.</p>
</noscript>
    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;
        
        const GSHEET_URL = "https://script.google.com/macros/s/AKfycbyjQjA3aja6XbLWKChoJ4FrO0O8Tt3t9zbdk7Qx1tNfrP9J66UJaKWVmzEB90OQR-Hg/exec"; 
        const ADMIN_USER = "mabdail_admin";
        const ADMIN_PASS = "Mabda2026!PHBI";
        
        const CONTACT_INFO = {
            whatsapp: "6281234567890",
            email: "phbi@mabdailfalah.com",
            address: "Kp. Tanjakan RT/RW 09/02, Desa Tanjakan, Kec. Rajeg, Tangerang, Banten 15540"
        };

        const KATEGORI_KAS = [
            "Infaq",
            "Shadaqah",
            "Donatur Tetap",
            "Operasional",
            "Peralatan",
            "Konsumsi",
            "Transport",
            "Lain-lain"
        ];

        const App = () => {
            const [isAdmin, setIsAdmin] = useState(false);
            const [showLoginModal, setShowLoginModal] = useState(false);
            const [showEditModal, setShowEditModal] = useState(false);
            const [showPassword, setShowPassword] = useState(false);
            const [loginData, setLoginData] = useState({ username: '', password: '' });
            const [editItem, setEditItem] = useState(null);
            const [view, setView] = useState('dashboard');
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [loading, setLoading] = useState(false);
            
            const [transactions, setTransactions] = useState([]);
            const [galleryItems, setGalleryItems] = useState([]);
            const [pengurusList, setPengurusList] = useState([]);
            const [currentTime, setCurrentTime] = useState(new Date());

            const refreshIcons = useCallback(() => {
                if (window.lucide) window.lucide.createIcons();
            }, []);

            useEffect(() => {
                refreshIcons();
            }, [view, isAdmin, showLoginModal, showEditModal, sidebarOpen, transactions, pengurusList, galleryItems, refreshIcons]);

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                fetchAllData();
                return () => clearInterval(timer);
            }, []);

            const fetchAllData = async () => {
                setLoading(true);
                try {
                    const [resTrans, resGal, resPeng] = await Promise.all([
                        fetch(`${GSHEET_URL}?sheet=Sheet1`),
                        fetch(`${GSHEET_URL}?sheet=galeri`),
                        fetch(`${GSHEET_URL}?sheet=pengurus`)
                    ]);
                    
                    const dataTrans = await resTrans.json();
                    const dataGal = await resGal.json();
                    const dataPeng = await resPeng.json();

                    setTransactions(Array.isArray(dataTrans) ? dataTrans.sort((a, b) => b.id - a.id) : []);
                    setGalleryItems(Array.isArray(dataGal) ? dataGal.sort((a, b) => b.id - a.id) : []);
                    setPengurusList(Array.isArray(dataPeng) ? dataPeng : []);
                } catch (error) {
                    console.error("Fetch error:", error);
                } finally {
                    setLoading(false);
                }
            };

            const handleSubmitAction = async (e) => {
                e.preventDefault();
                setLoading(true);
                const formData = new FormData(e.target);
                const isEdit = formData.get('action_type') === 'update';
                
                let payload = { action: isEdit ? 'edit' : 'insert', data: {} };

                try {
                    const currentType = editItem?._type || (view.includes('kas') ? 'kas' : view.includes('galeri') ? 'galeri' : 'pengurus');
                    
                    if (currentType === 'kas') {
                        payload.sheet = 'Sheet1';
                        payload.data = {
                            id: isEdit ? formData.get('id') : Date.now().toString(),
                            date: isEdit ? formData.get('date') : new Date().toLocaleDateString('id-ID'),
                            description: formData.get('description'),
                            category: formData.get('category'),
                            type: formData.get('type'),
                            amount: Number(formData.get('amount'))
                        };
                    } else if (currentType === 'pengurus') {
                        payload.sheet = 'pengurus';
                        payload.action = isEdit ? 'edit_pengurus' : 'insert';
                        payload.data = {
                            id: isEdit ? formData.get('id') : Date.now().toString(),
                            nama: formData.get('nama'),
                            sebagai: formData.get('sebagai'),
                            kontak: formData.get('kontak') || ""
                        };
                    } else if (currentType === 'galeri') {
                        payload.sheet = 'galeri';
                        payload.data = {
                            id: isEdit ? formData.get('id') : Date.now().toString(),
                            tanggal: formData.get('tanggal') || new Date().toLocaleDateString('id-ID'),
                            judul: formData.get('judul'),
                            imageUrl: formData.get('imageUrl')
                        };
                    }

                    const response = await fetch(GSHEET_URL, {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });

                    if (response.ok) {
                        setShowEditModal(false);
                        setEditItem(null);
                        fetchAllData();
                        setView(view.replace('add-', ''));
                    }
                } catch (error) {
                    alert("Gagal memproses data.");
                } finally {
                    setLoading(false);
                }
            };

            const handleDelete = async (id, sheet) => {
                if (!confirm(`Hapus data ini secara permanen?`)) return;
                setLoading(true);
                try {
                    const response = await fetch(GSHEET_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: "delete", id: id, sheet: sheet })
                    });
                    if (response.ok) fetchAllData();
                } catch (error) {
                    alert("Gagal menghapus data.");
                } finally {
                    setLoading(false);
                }
            };

            const openEdit = (item, type) => {
                setEditItem({...item, _type: type});
                setShowEditModal(true);
            };

            const handleLogin = (e) => {
                e.preventDefault();
                if (loginData.username === ADMIN_USER && loginData.password === ADMIN_PASS) {
                    setIsAdmin(true);
                    setShowLoginModal(false);
                    setLoginData({ username: '', password: '' });
                } else {
                    alert("Username atau Password salah!");
                }
            };

            const totals = useMemo(() => {
                const tin = transactions.filter(t => t.type === 'in').reduce((acc, curr) => acc + Number(curr.amount), 0);
                const tout = transactions.filter(t => t.type === 'out').reduce((acc, curr) => acc + Number(curr.amount), 0);
                return { in: tin, out: tout, balance: tin - tout };
            }, [transactions]);

            const formatCurrency = (amount) => {
                return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(amount || 0);
            };

            return (
                <div className="flex flex-col min-h-screen">
                    {/* Header */}
                    <header className="sticky top-0 z-50 glass-header border-b border-slate-200 px-4 md:px-8 py-3 flex items-center justify-between">
                        <div className="flex items-center gap-3">
                            <button onClick={() => setSidebarOpen(true)} className="lg:hidden p-2 text-green-700 bg-green-50 rounded-xl">
                                <i data-lucide="menu"></i>
                            </button>
                            <div className="flex items-center gap-2 md:gap-3">
                                <div className="w-9 h-9 md:w-11 md:h-11 bg-green-700 rounded-full flex items-center justify-center text-white shadow-lg font-black text-xs md:text-sm">MF</div>
                                <div className="text-left">
                                    <h1 className="text-sm md:text-lg font-extrabold text-green-800 leading-tight">MABDA'IL FALAH</h1>
                                    <p className="text-[8px] md:text-[9px] font-bold text-slate-400 uppercase tracking-widest">PHBI & KAS</p>
                                </div>
                            </div>
                        </div>
                        
                        <div className="text-right flex flex-col items-end">
                            <div className="text-sm md:text-lg font-mono font-black text-slate-800 leading-none">
                                {currentTime.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}
                            </div>
                            <div className="text-[8px] md:text-[10px] font-bold text-slate-500 uppercase tracking-tighter mt-1 whitespace-nowrap">
                                {new Intl.DateTimeFormat('id-ID', { day: 'numeric', month: 'short', year: 'numeric' }).format(currentTime)}
                            </div>
                        </div>
                    </header>

                    {/* Marquee */}
                    <div className="marquee-container no-print">
                        <div className="marquee-content">
                            <span className="mx-8">Saldo Kas: {formatCurrency(totals.balance)}</span>
                            <span className="mx-8">•</span>
                            <span className="mx-8">Infaq & Shadaqah anda sangat berarti bagi kami</span>
                            <span className="mx-8">•</span>
                            <span className="mx-8">Mabda'il Falah - Kp. Tanjakan</span>
                        </div>
                    </div>

                    <div className="flex flex-1 overflow-hidden">
                        {/* Sidebar */}
                        <aside className={`fixed inset-y-0 left-0 z-[60] w-64 bg-white border-r shadow-2xl transition-transform duration-300 lg:translate-x-0 lg:static lg:shadow-none ${sidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                            <div className="p-4 space-y-1 h-full flex flex-col relative">
                                <button onClick={() => setSidebarOpen(false)} className="lg:hidden absolute top-4 right-4 p-2 text-slate-400 hover:text-red-500">
                                    <i data-lucide="x"></i>
                                </button>

                                <div className="mb-6 mt-4 lg:mt-0 px-4">
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Main Menu</p>
                                </div>
                                
                                <nav className="space-y-1">
                                    {[
                                        { id: 'dashboard', icon: 'layout-grid', label: 'Dashboard' },
                                        { id: 'history', icon: 'file-text', label: 'Laporan Kas' },
                                        { id: 'galeri', icon: 'image', label: 'Dokumentasi' },
                                        { id: 'struktur', icon: 'users', label: 'Pengurus' }
                                    ].map(item => (
                                        <button key={item.id} onClick={() => {setView(item.id); setSidebarOpen(false)}} className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl font-bold text-sm transition-all ${view === item.id ? 'active-nav' : 'text-slate-500 hover:bg-slate-50'}`}>
                                            <i data-lucide={item.icon} className="w-5 h-5"></i> {item.label}
                                        </button>
                                    ))}
                                </nav>

                                {isAdmin && (
                                    <div className="mt-8 pt-6 border-t border-slate-100">
                                        <p className="px-4 text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3">Admin Panel</p>
                                        <div className="space-y-2">
                                            <button onClick={() => {setView('add-kas'); setSidebarOpen(false)}} className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl font-bold text-sm ${view === 'add-kas' ? 'active-admin' : 'text-blue-600 bg-blue-50'}`}>
                                                <i data-lucide="plus-circle" className="w-5 h-5"></i> Input Kas
                                            </button>
                                            <button onClick={() => {setView('add-galeri'); setSidebarOpen(false)}} className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl font-bold text-sm ${view === 'add-galeri' ? 'active-admin' : 'text-purple-600 bg-purple-50'}`}>
                                                <i data-lucide="image-plus" className="w-5 h-5"></i> Input Dokumentasi
                                            </button>
                                            <button onClick={() => {setView('add-pengurus'); setSidebarOpen(false)}} className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl font-bold text-sm ${view === 'add-pengurus' ? 'active-admin' : 'text-orange-600 bg-orange-50'}`}>
                                                <i data-lucide="user-plus" className="w-5 h-5"></i> Input Pengurus
                                            </button>
                                        </div>
                                    </div>
                                )}

                                <div className="mt-auto pt-4">
                                    {!isAdmin ? (
                                        <button onClick={() => setShowLoginModal(true)} className="w-full py-4 bg-slate-900 text-white rounded-2xl font-black text-[10px] tracking-widest flex items-center justify-center gap-2">
                                            <i data-lucide="lock" className="w-4 h-4"></i> LOGIN ADMIN
                                        </button>
                                    ) : (
                                        <button onClick={() => setIsAdmin(false)} className="w-full py-4 bg-red-50 text-red-600 rounded-2xl font-black text-[10px] tracking-widest flex items-center justify-center gap-2">
                                            <i data-lucide="log-out" className="w-4 h-4"></i> KELUAR
                                        </button>
                                    )}
                                </div>
                            </div>
                        </aside>

                        {/* Content */}
                        <main className="flex-1 overflow-y-auto bg-[#F8FAFC] p-4 md:p-8 custom-scrollbar">
                            {loading && (
                                <div className="flex flex-col items-center justify-center py-20 animate-pulse">
                                    <div className="w-10 h-10 border-4 border-green-700 border-t-transparent rounded-full animate-spin mb-4"></div>
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Sinkronisasi Data...</p>
                                </div>
                            )}

                            {!loading && view === 'dashboard' && (
                                <div className="max-w-5xl mx-auto space-y-6 text-left">
                                    <div className="bg-gradient-to-br from-green-800 to-green-600 p-8 rounded-[40px] text-white shadow-xl">
                                        <h2 className="text-2xl md:text-4xl font-black mb-6">Ringkasan Kas</h2>
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                            <div className="bg-white/10 p-5 rounded-3xl border border-white/5">
                                                <p className="text-[9px] font-black uppercase opacity-60 mb-1">Pemasukan</p>
                                                <h3 className="text-lg font-black">{formatCurrency(totals.in)}</h3>
                                            </div>
                                            <div className="bg-white/10 p-5 rounded-3xl border border-white/5">
                                                <p className="text-[9px] font-black uppercase opacity-60 mb-1">Pengeluaran</p>
                                                <h3 className="text-lg font-black">{formatCurrency(totals.out)}</h3>
                                            </div>
                                            <div className="bg-white p-5 rounded-3xl text-green-900">
                                                <p className="text-[9px] font-black uppercase opacity-50 mb-1">Saldo Akhir</p>
                                                <h3 className="text-lg font-black">{formatCurrency(totals.balance)}</h3>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                                        {[
                                            { label: 'Transaksi', val: transactions.length, icon: 'trending-up', bg: 'bg-green-50', text: 'text-green-600' },
                                            { label: 'Pengurus', val: pengurusList.length, icon: 'users', bg: 'bg-blue-50', text: 'text-blue-600' },
                                            { label: 'Foto', val: galleryItems.length, icon: 'image', bg: 'bg-purple-50', text: 'text-purple-600' },
                                            { label: 'Lokasi', val: 'Tanjakan', icon: 'map-pin', bg: 'bg-orange-50', text: 'text-orange-600' }
                                        ].map((stat, i) => (
                                            <div key={i} className="bg-white p-6 rounded-[32px] border border-slate-100 flex flex-col items-center">
                                                <div className={`w-10 h-10 ${stat.bg} ${stat.text} rounded-full flex items-center justify-center mb-3`}><i data-lucide={stat.icon} className="w-5 h-5"></i></div>
                                                <p className="text-[9px] font-black text-slate-400 uppercase">{stat.label}</p>
                                                <h4 className="font-black text-slate-800">{stat.val}</h4>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* Views for History, Galeri, Struktur tetap sama... */}
                            {!loading && view === 'history' && (
                                <div className="max-w-6xl mx-auto space-y-6 text-left">
                                    <div className="flex justify-between items-center">
                                        <h2 className="text-xl font-black text-slate-800">Laporan Keuangan</h2>
                                        {isAdmin && <button onClick={() => setView('add-kas')} className="bg-slate-900 text-white px-4 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest">+ Baru</button>}
                                    </div>
                                    <div className="bg-white rounded-[32px] overflow-hidden border border-slate-100 shadow-sm overflow-x-auto">
                                        <table className="w-full text-left min-w-[600px]">
                                            <thead className="bg-slate-50 text-[9px] font-black text-slate-400 uppercase">
                                                <tr>
                                                    <th className="p-5">Tanggal</th>
                                                    <th className="p-5">Keterangan</th>
                                                    <th className="p-5 text-right">Debit</th>
                                                    <th className="p-5 text-right">Kredit</th>
                                                    {isAdmin && <th className="p-5 text-center">Aksi</th>}
                                                </tr>
                                            </thead>
                                            <tbody className="text-xs divide-y divide-slate-50">
                                                {transactions.map((t, i) => (
                                                    <tr key={t.id || i} className="hover:bg-slate-50/50">
                                                        <td className="p-5 font-bold text-slate-500 whitespace-nowrap">{t.date}</td>
                                                        <td className="p-5">
                                                            <div className="font-bold text-slate-800">{t.description}</div>
                                                            <div className="text-[9px] font-black text-slate-300 uppercase mt-1">{t.category}</div>
                                                        </td>
                                                        <td className="p-5 text-right font-black text-green-600">{t.type === 'in' ? formatCurrency(t.amount) : '-'}</td>
                                                        <td className="p-5 text-right font-black text-red-500">{t.type === 'out' ? formatCurrency(t.amount) : '-'}</td>
                                                        {isAdmin && (
                                                            <td className="p-5 text-center whitespace-nowrap">
                                                                <button onClick={() => openEdit(t, 'kas')} className="p-2 text-blue-400"><i data-lucide="edit-2" className="w-4 h-4"></i></button>
                                                                <button onClick={() => handleDelete(t.id, 'Sheet1')} className="p-2 text-red-400"><i data-lucide="trash" className="w-4 h-4"></i></button>
                                                            </td>
                                                        )}
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {!loading && view === 'galeri' && (
                                <div className="max-w-6xl mx-auto space-y-6 text-left">
                                    <div className="flex justify-between items-center">
                                        <h2 className="text-xl font-black text-slate-800">Dokumentasi Kegiatan</h2>
                                        {isAdmin && <button onClick={() => setView('add-galeri')} className="bg-slate-900 text-white px-4 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest">+ Foto</button>}
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {galleryItems.map((item, i) => (
                                            <div key={item.id || i} className="bg-white rounded-[32px] overflow-hidden border border-slate-100 group relative">
                                                {isAdmin && (
                                                    <div className="absolute top-4 right-4 z-10 flex gap-2">
                                                        <button onClick={() => openEdit(item, 'galeri')} className="bg-white/90 p-2 rounded-xl text-blue-600 shadow-lg"><i data-lucide="edit-2" className="w-4 h-4"></i></button>
                                                        <button onClick={() => handleDelete(item.id, 'galeri')} className="bg-white/90 p-2 rounded-xl text-red-600 shadow-lg"><i data-lucide="trash" className="w-4 h-4"></i></button>
                                                    </div>
                                                )}
                                                <img src={item.imageUrl} className="w-full aspect-video object-cover" loading="lazy" />
                                                <div className="p-5">
                                                    <p className="text-[9px] font-black text-green-600 uppercase mb-1">{item.tanggal}</p>
                                                    <h3 className="font-bold text-slate-800">{item.judul}</h3>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {!loading && view === 'struktur' && (
                                <div className="max-w-6xl mx-auto space-y-6 text-left">
                                    <div className="flex justify-between items-center">
                                        <h2 className="text-xl font-black text-slate-800">Pengurus PHBI</h2>
                                        {isAdmin && <button onClick={() => setView('add-pengurus')} className="bg-slate-900 text-white px-4 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest">+ Pengurus</button>}
                                    </div>
                                    <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
                                        {pengurusList.map((p, i) => (
                                            <div key={p.id || i} className="bg-white p-5 rounded-[28px] border border-slate-100 flex flex-col items-center relative group">
                                                {isAdmin && (
                                                    <div className="absolute top-2 right-2 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                                        <button onClick={() => openEdit(p, 'pengurus')} className="p-1.5 text-blue-400"><i data-lucide="edit-2" className="w-3 h-3"></i></button>
                                                        <button onClick={() => handleDelete(p.id, 'pengurus')} className="p-1.5 text-red-400"><i data-lucide="trash" className="w-3 h-3"></i></button>
                                                    </div>
                                                )}
                                                <div className="w-14 h-14 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-300 mb-3"><i data-lucide="user" className="w-7 h-7"></i></div>
                                                <h4 className="font-black text-slate-800 text-xs text-center leading-tight">{p.nama}</h4>
                                                <p className="text-[8px] font-black text-green-600 uppercase tracking-widest mt-2">{p.sebagai || p.jabatan}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* Footer */}
                            <footer className="mt-12 pt-8 border-t border-slate-200 text-left">
                                <div className="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                                    <div className="space-y-4">
                                        <h4 className="text-sm font-black text-green-800 uppercase tracking-widest">Informasi Kontak</h4>
                                        <div className="space-y-3">
                                            <a href={`https://wa.me/${CONTACT_INFO.whatsapp}`} className="flex items-center gap-3 text-slate-500 hover:text-green-600 transition-colors">
                                                <div className="w-8 h-8 bg-green-50 rounded-lg flex items-center justify-center text-green-600"><i data-lucide="phone" className="w-4 h-4"></i></div>
                                                <span className="text-xs font-bold">+{CONTACT_INFO.whatsapp}</span>
                                            </a>
                                            <div className="flex items-center gap-3 text-slate-500">
                                                <div className="w-8 h-8 bg-blue-50 rounded-lg flex items-center justify-center text-blue-600"><i data-lucide="mail" className="w-4 h-4"></i></div>
                                                <span className="text-xs font-bold">{CONTACT_INFO.email}</span>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="space-y-4">
                                        <h4 className="text-sm font-black text-green-800 uppercase tracking-widest">Lokasi Sekretariat</h4>
                                        <div className="flex gap-3 text-slate-500">
                                            <div className="w-8 h-8 shrink-0 bg-orange-50 rounded-lg flex items-center justify-center text-orange-600"><i data-lucide="map-pin" className="w-4 h-4"></i></div>
                                            <p className="text-xs font-bold leading-relaxed">{CONTACT_INFO.address}</p>
                                        </div>
                                    </div>
                                </div>
                                <div className="text-center py-6 border-t border-slate-100">
                                    <p className="text-[10px] font-black text-slate-300 uppercase tracking-widest">© 2026 MABDA'IL FALAH - PHBI & KAS SYSTEM</p>
                                </div>
                            </footer>
                        </main>
                    </div>

                    {/* Modal Input/Edit */}
                    {(isAdmin && (view.startsWith('add-') || showEditModal)) && (
                        <div className="fixed inset-0 z-[100] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-lg rounded-[40px] p-8 shadow-2xl relative animate-in zoom-in duration-300 max-h-[90vh] overflow-y-auto">
                                <button onClick={() => {setShowEditModal(false); setView('dashboard'); setEditItem(null)}} className="absolute top-6 right-6 p-2 text-slate-300"><i data-lucide="x"></i></button>
                                <h3 className="text-xl font-black mb-6 text-left">{editItem ? 'Edit Data' : 'Tambah Baru'}</h3>
                                
                                <form onSubmit={handleSubmitAction} className="space-y-5 text-left">
                                    <input type="hidden" name="action_type" value={editItem ? 'update' : 'insert'} />
                                    {editItem && <input type="hidden" name="id" value={editItem.id} />}
                                    
                                    {(view.includes('kas') || editItem?._type === 'kas') && (
                                        <div className="space-y-4">
                                            <div className="space-y-1">
                                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Keterangan</label>
                                                <input name="description" defaultValue={editItem?.description} placeholder="Contoh: Pembelian Karpet" className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none focus:ring-2 focus:ring-green-100" required />
                                            </div>
                                            
                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="space-y-1">
                                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Jumlah (IDR)</label>
                                                    <input name="amount" defaultValue={editItem?.amount} type="number" placeholder="0" className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none" required />
                                                </div>
                                                <div className="space-y-1">
                                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Jenis Kas</label>
                                                    <select name="type" defaultValue={editItem?.type || "in"} className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none cursor-pointer">
                                                        <option value="in">MASUK</option>
                                                        <option value="out">KELUAR</option>
                                                    </select>
                                                </div>
                                            </div>
                                            
                                            <div className="space-y-1">
                                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Pilih Kategori</label>
                                                <select name="category" defaultValue={editItem?.category} className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none cursor-pointer" required>
                                                    <option value="" disabled>-- Pilih Kategori --</option>
                                                    {KATEGORI_KAS.map(kat => (
                                                        <option key={kat} value={kat}>{kat}</option>
                                                    ))}
                                                </select>
                                            </div>
                                        </div>
                                    )}

                                    {/* Inputs for Galeri & Pengurus */}
                                    {(view.includes('galeri') || editItem?._type === 'galeri') && (
                                        <div className="space-y-4">
                                            <input name="judul" defaultValue={editItem?.judul} placeholder="Judul Kegiatan" className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none" required />
                                            <input name="imageUrl" defaultValue={editItem?.imageUrl} type="url" placeholder="URL Foto" className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none" required />
                                            <input name="tanggal" defaultValue={editItem?.tanggal || new Date().toLocaleDateString('id-ID')} placeholder="Tanggal" className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none" required />
                                        </div>
                                    )}

                                    {(view.includes('pengurus') || editItem?._type === 'pengurus') && (
                                        <div className="space-y-4">
                                            <input name="nama" defaultValue={editItem?.nama} placeholder="Nama Lengkap" className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none" required />
                                            <input name="sebagai" defaultValue={editItem?.sebagai || editItem?.jabatan} placeholder="Jabatan" className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none" required />
                                        </div>
                                    )}

                                    <button type="submit" className="w-full py-4 bg-slate-900 text-white rounded-2xl font-black text-xs tracking-widest uppercase shadow-lg hover:bg-slate-800 transition-colors">Simpan Data</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Modal Login */}
                    {showLoginModal && (
                        <div className="fixed inset-0 z-[100] bg-slate-900/40 backdrop-blur-xl flex items-center justify-center p-4">
                            <div className="bg-white w-full max-sm rounded-[40px] p-10 shadow-2xl relative">
                                <button onClick={() => setShowLoginModal(false)} className="absolute top-8 right-8 text-slate-300"><i data-lucide="x"></i></button>
                                <h3 className="text-xl font-black text-slate-800 text-center mb-6">Admin Access</h3>
                                <form onSubmit={handleLogin} className="space-y-4">
                                    <input type="text" placeholder="Username" className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-green-200" value={loginData.username} onChange={e => setLoginData({...loginData, username: e.target.value})} />
                                    <div className="relative">
                                        <input type={showPassword ? "text" : "password"} placeholder="Password" className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-green-200" value={loginData.password} onChange={e => setLoginData({...loginData, password: e.target.value})} />
                                        <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-300"><i data-lucide={showPassword ? "eye-off" : "eye"} className="w-5 h-5"></i></button>
                                    </div>
                                    <button type="submit" className="w-full py-4 bg-slate-900 text-white rounded-2xl font-black uppercase text-[10px] tracking-widest mt-2">Login</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
