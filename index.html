<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kas PHBI MABDA'IL FALAH</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const GSHEET_URL = "https://script.google.com/macros/s/AKfycbw488C_jSYN96tRoU9nM-tBbCiqOV1xBAd68uaxa2fn4dQ52_ylzWos1-7YvmtFAQEt/exec";
const ADMIN_USER = "admin";
const ADMIN_PASS = "admin123";

const Icon = ({ name, size = 20 }) => (
    <i data-lucide={name} style={{ width: size, height: size }}></i>
);

const App = () => {
    const [view, setView] = useState("dashboard");
    const [transactions, setTransactions] = useState([]);
    const [loading, setLoading] = useState(false);
    const [searchTerm, setSearchTerm] = useState("");

    useEffect(() => {
        fetchData();
        setTimeout(() => lucide.createIcons(), 500);
    }, []);

    useEffect(() => {
        lucide.createIcons();
    }, [view, transactions]);

    const fetchData = async () => {
        setLoading(true);
        try {
            const res = await fetch(GSHEET_URL);
            const data = await res.json();
            setTransactions(data.sort((a, b) => b.id - a.id));
        } catch (e) {
            console.error(e);
        }
        setLoading(false);
    };

    const formatCurrency = (amount) =>
        new Intl.NumberFormat("id-ID", {
            style: "currency",
            currency: "IDR",
            minimumFractionDigits: 0
        }).format(amount || 0);

    const totalIn = transactions.filter(t => t.type === "in").reduce((a, b) => a + Number(b.amount), 0);
    const totalOut = transactions.filter(t => t.type === "out").reduce((a, b) => a + Number(b.amount), 0);
    const balance = totalIn - totalOut;

    const filtered = transactions.filter(t =>
        t.description?.toLowerCase().includes(searchTerm.toLowerCase())
    );

    return (
        <div className="flex min-h-screen bg-slate-50">

            {/* SIDEBAR */}
            <aside className="w-64 bg-white border-r hidden lg:block">
                <div className="p-6 text-center border-b">
                    <h1 className="font-black text-green-700">MABDA'IL FALAH</h1>
                </div>

                <nav className="p-4 space-y-2">
                    <button onClick={()=>setView("dashboard")} className="w-full text-left">Dashboard</button>
                    <button onClick={()=>setView("history")} className="w-full text-left">Riwayat</button>
                    <button onClick={()=>setView("struktur")} className="w-full text-left">Kepengurusan</button>
                </nav>
            </aside>

            {/* MAIN */}
            <div className="flex flex-col flex-1">

                <main className="flex-1 p-6">

                    <h2 className="text-2xl font-bold mb-6 uppercase">{view}</h2>

                    {/* DASHBOARD */}
                    {view === "dashboard" && (
                        <div className="grid md:grid-cols-3 gap-4">
                            <div className="bg-green-600 text-white p-4 rounded-xl">
                                Saldo<br/><b>{formatCurrency(balance)}</b>
                            </div>
                            <div className="bg-blue-600 text-white p-4 rounded-xl">
                                Masuk<br/><b>{formatCurrency(totalIn)}</b>
                            </div>
                            <div className="bg-red-600 text-white p-4 rounded-xl">
                                Keluar<br/><b>{formatCurrency(totalOut)}</b>
                            </div>
                        </div>
                    )}

                    {/* STRUKTUR */}
                    {view === "struktur" && (
                        <div className="bg-white p-6 rounded-xl shadow">
                            <h3 className="font-bold mb-4 text-center">Struktur PHBI</h3>
                            <div className="space-y-2">
                                <div>Ketua : -</div>
                                <div>Wakil : -</div>
                                <div>Sekretaris : -</div>
                                <div>Bendahara : -</div>
                            </div>
                        </div>
                    )}

                    {/* HISTORY */}
                    {view === "history" && (
                        <div className="bg-white rounded-xl shadow">

                            <div className="p-4">
                                <input
                                    placeholder="Cari..."
                                    className="border p-2 w-full"
                                    onChange={(e)=>setSearchTerm(e.target.value)}
                                />
                            </div>

                            <table className="w-full text-sm">
                                <thead className="bg-gray-100">
                                    <tr>
                                        <th className="p-2">Tgl</th>
                                        <th>Deskripsi</th>
                                        <th>Kategori</th>
                                        <th>Nominal</th>
                                    </tr>
                                </thead>

                                <tbody>
                                    {filtered.map((t,i)=>(
                                        <tr key={i} className="border-t">
                                            <td className="p-2">
                                                {t.date
                                                    ? new Date(t.date).toLocaleDateString("id-ID")
                                                    : "-"}
                                            </td>
                                            <td>{t.description}</td>
                                            <td>{t.category}</td>
                                            <td className={t.type==="in"?"text-green-600":"text-red-600"}>
                                                {formatCurrency(t.amount)}
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    )}

                </main>

                {/* FOOTER FIXED */}
                <footer className="bg-white border-t text-center text-xs py-3">
                    <p className="font-bold">Pondok Pesantren MABDA'IL FALAH</p>
                    <p>Kp. Tanjakan</p>
                    <p>© {new Date().getFullYear()}</p>
                </footer>

            </div>
        </div>
    );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
